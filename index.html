<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rae Enterprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Quicksand:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════
   RAE ENTERPRISE — Global Styles
   Theme: Glassmorphism Neon Purple × Cyan
═══════════════════════════════════════════════════════ */

:root {
  --neon-purple: #7B2EFF;
  --neon-purple-light: #9D5FFF;
  --neon-cyan: #00F5FF;
  --neon-pink: #FF2EBD;
  --neon-gold: #FFD700;
  --bg-dark: #0A0014;
  --bg-mid: #110024;
  --bg-card: rgba(123, 46, 255, 0.08);
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(123, 46, 255, 0.3);
  --glass-hover: rgba(123, 46, 255, 0.15);
  --text-primary: #F0E6FF;
  --text-secondary: rgba(240,230,255,0.65);
  --text-muted: rgba(240,230,255,0.35);
  --shadow-purple: 0 0 30px rgba(123, 46, 255, 0.4);
  --shadow-cyan: 0 0 20px rgba(0, 245, 255, 0.3);
  --shadow-pink: 0 0 20px rgba(255, 46, 189, 0.3);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-lg: 32px;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Quicksand', sans-serif;
  --font-script: 'Dancing Script', cursive;
  --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-dark: #f0e8ff;
  --bg-mid: #e8d5ff;
  --bg-card: rgba(123, 46, 255, 0.06);
  --glass: rgba(255,255,255,0.6);
  --glass-border: rgba(123, 46, 255, 0.25);
  --glass-hover: rgba(123, 46, 255, 0.12);
  --text-primary: #1a0040;
  --text-secondary: rgba(26,0,64,0.7);
  --text-muted: rgba(26,0,64,0.4);
  --shadow-purple: 0 8px 32px rgba(123, 46, 255, 0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── Particle Background ── */
#particles-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,46,255,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,245,255,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 60% 30%, rgba(255,46,189,0.1) 0%, transparent 50%),
    linear-gradient(160deg, #0A0014 0%, #0d001f 40%, #070020 70%, #000d1a 100%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}

[data-theme="light"] #particles-bg {
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,46,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,245,255,0.08) 0%, transparent 55%),
    linear-gradient(160deg, #f5eeff 0%, #ead5ff 50%, #dde8ff 100%);
}

@keyframes bgPulse {
  0% { opacity: 1; }
  100% { opacity: 0.85; }
}

/* Floating sparkles */
#particles-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle 1.5px at 15% 25%, rgba(0,245,255,0.6) 0%, transparent 100%),
    radial-gradient(circle 1px at 85% 15%, rgba(255,46,189,0.5) 0%, transparent 100%),
    radial-gradient(circle 2px at 45% 70%, rgba(123,46,255,0.7) 0%, transparent 100%),
    radial-gradient(circle 1px at 72% 55%, rgba(0,245,255,0.4) 0%, transparent 100%),
    radial-gradient(circle 1.5px at 30% 85%, rgba(255,46,189,0.5) 0%, transparent 100%),
    radial-gradient(circle 1px at 92% 40%, rgba(123,46,255,0.6) 0%, transparent 100%),
    radial-gradient(circle 2px at 60% 10%, rgba(0,245,255,0.5) 0%, transparent 100%);
  animation: sparkle 4s ease-in-out infinite alternate;
}

@keyframes sparkle {
  0% { transform: scale(1); opacity: 0.7; }
  100% { transform: scale(1.1); opacity: 1; }
}

#app { position: relative; z-index: 1; min-height: 100vh; }

/* ── Glass Card ── */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  transition: var(--transition);
}
.glass-card:hover {
  border-color: var(--neon-purple);
  box-shadow: var(--shadow-purple);
  transform: translateY(-2px);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border: none; border-radius: 50px;
  font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
  cursor: pointer; transition: var(--transition); text-decoration: none;
  position: relative; overflow: hidden; white-space: nowrap;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0.1); opacity: 0;
  transition: opacity 0.2s;
}
.btn:hover::after { opacity: 1; }

.btn-primary {
  background: linear-gradient(135deg, var(--neon-purple), #5B0FCC);
  color: #fff;
  box-shadow: 0 4px 20px rgba(123,46,255,0.5);
}
.btn-primary:hover { box-shadow: 0 6px 30px rgba(123,46,255,0.8); transform: translateY(-2px); }

.btn-cyan {
  background: linear-gradient(135deg, var(--neon-cyan), #00B8CC);
  color: #000;
  box-shadow: 0 4px 20px rgba(0,245,255,0.4);
}
.btn-cyan:hover { box-shadow: 0 6px 30px rgba(0,245,255,0.7); transform: translateY(-2px); }

.btn-outline {
  background: transparent;
  color: var(--neon-purple-light);
  border: 1.5px solid var(--neon-purple);
}
.btn-outline:hover {
  background: var(--glass-hover); box-shadow: var(--shadow-purple);
}

.btn-ghost {
  background: var(--glass); color: var(--text-primary);
  border: 1px solid var(--glass-border);
}
.btn-ghost:hover { background: var(--glass-hover); }

.btn-pink {
  background: linear-gradient(135deg, var(--neon-pink), #CC0090);
  color: #fff; box-shadow: var(--shadow-pink);
}
.btn-pink:hover { box-shadow: 0 6px 30px rgba(255,46,189,0.7); transform: translateY(-2px); }

.btn-sm { padding: 8px 18px; font-size: 0.8rem; }
.btn-lg { padding: 16px 40px; font-size: 1.05rem; }
.btn-full { width: 100%; justify-content: center; }

/* ── Inputs ── */
.input-group {
  display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
}
.input-group label {
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase;
}
.input-field {
  background: rgba(123,46,255,0.08);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  color: var(--text-primary);
  font-family: var(--font-body); font-size: 0.95rem;
  transition: var(--transition); outline: none; width: 100%;
}
.input-field::placeholder { color: var(--text-muted); }
.input-field:focus {
  border-color: var(--neon-purple);
  box-shadow: 0 0 0 3px rgba(123,46,255,0.2);
  background: rgba(123,46,255,0.12);
}
.input-field:focus + .input-icon { color: var(--neon-purple); }

.input-wrapper { position: relative; }
.input-wrapper .input-icon {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); transition: color 0.2s; cursor: pointer; font-size: 1.1rem;
}

/* ── Neon Text ── */
.text-neon-purple { color: var(--neon-purple); text-shadow: 0 0 20px rgba(123,46,255,0.6); }
.text-neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0,245,255,0.6); }
.text-neon-pink { color: var(--neon-pink); text-shadow: 0 0 20px rgba(255,46,189,0.6); }
.text-gold { color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); }
.text-gradient {
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.text-gradient-pink {
  background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 50px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
.badge-purple { background: rgba(123,46,255,0.2); color: var(--neon-purple-light); border: 1px solid rgba(123,46,255,0.3); }
.badge-cyan { background: rgba(0,245,255,0.15); color: var(--neon-cyan); border: 1px solid rgba(0,245,255,0.3); }
.badge-pink { background: rgba(255,46,189,0.15); color: var(--neon-pink); border: 1px solid rgba(255,46,189,0.3); }
.badge-gold { background: rgba(255,215,0,0.15); color: var(--neon-gold); border: 1px solid rgba(255,215,0,0.3); }
.badge-off {
  background: linear-gradient(135deg, var(--neon-pink), #cc0090);
  color: #fff; box-shadow: var(--shadow-pink);
  animation: pulseBadge 2s ease-in-out infinite;
}
@keyframes pulseBadge { 0%,100% { box-shadow: var(--shadow-pink); } 50% { box-shadow: 0 0 25px rgba(255,46,189,0.8); } }

/* ── Loading Spinner ── */
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--glass-border);
  border-top-color: var(--neon-purple); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.page-loader {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  background: var(--bg-dark);
  transition: opacity 0.4s ease;
}
.page-loader.fade-out { opacity: 0; pointer-events: none; }
.page-loader .logo-text {
  font-family: var(--font-script); font-size: 2.5rem; color: var(--text-primary);
  animation: shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100% { text-shadow: 0 0 20px var(--neon-purple); }
  50% { text-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-purple); }
}

/* ── Toast ── */
#toast-container {
  position: fixed; bottom: 90px; right: 20px; z-index: 9000;
  display: flex; flex-direction: column; gap: 10px; max-width: 320px;
}
.toast {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  animation: slideInToast 0.4s ease, fadeOutToast 0.4s ease 3.6s forwards;
  box-shadow: var(--shadow-purple);
}
.toast.success { border-color: var(--neon-cyan); }
.toast.error { border-color: var(--neon-pink); }
.toast.warn { border-color: var(--neon-gold); }
.toast-icon { font-size: 1.2rem; }
.toast-msg { font-size: 0.875rem; color: var(--text-primary); }
@keyframes slideInToast { from { transform: translateX(120%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes fadeOutToast { to { transform: translateX(120%); opacity: 0; } }

/* ── Divider ── */
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }
.divider span { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }

/* ── Progress Bar ── */
.progress-bar {
  height: 6px; background: var(--glass); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
  box-shadow: 0 0 10px rgba(0,245,255,0.5);
  transition: width 0.5s ease;
}

/* ── Section Titles ── */
.section-title {
  font-family: var(--font-display); font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 700; margin-bottom: 8px;
}
.section-sub { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 28px; }

/* ── Grid Layouts ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}
@media (max-width: 600px) {
  .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}

/* ── Page Transitions ── */
.page-enter { animation: pageIn 0.4s ease; }
@keyframes pageIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(123,46,255,0.4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

/* ── Utility ── */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-sm { font-size: 0.85rem; }
.text-xs { font-size: 0.75rem; }
.fw-700 { font-weight: 700; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

/* ── Price Display ── */
.price-original { text-decoration: line-through; color: var(--text-muted); font-size: 0.85rem; }
.price-discount {
  font-size: 1.2rem; font-weight: 700; color: var(--neon-cyan);
  text-shadow: 0 0 15px rgba(0,245,255,0.5);
}

/* ── Glow Border Animation ── */
.glow-border {
  position: relative;
  border: 1px solid transparent;
  background-clip: padding-box;
}
.glow-border::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit; z-index: -1; padding: 1px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan), var(--neon-pink));
  background-size: 300% 300%;
  animation: gradientBorder 3s linear infinite;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}
@keyframes gradientBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── Stars ── */
.stars { color: var(--neon-gold); font-size: 0.85rem; letter-spacing: 2px; }

/* ── Overlay ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-mid); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 32px; max-width: 520px; width: 90%;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(60px) scale(0.95); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── Level Badge ── */
.level-bronze { color: #cd7f32; }
.level-silver { color: #c0c0c0; }
.level-gold { color: var(--neon-gold); }

/* ── Countdown ── */
.countdown { display: flex; gap: 10px; }
.countdown-unit {
  display: flex; flex-direction: column; align-items: center;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 8px 12px; min-width: 50px;
}
.countdown-num { font-size: 1.5rem; font-weight: 700; color: var(--neon-cyan); line-height: 1; }
.countdown-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

/* ── Animated order tracker dot ── */
@keyframes dotPulse {
  0%,100% { box-shadow: 0 0 8px rgba(0,245,255,0.6), 0 0 0 0 rgba(0,245,255,0.4); }
  50%      { box-shadow: 0 0 16px rgba(0,245,255,0.9), 0 0 0 8px rgba(0,245,255,0); }
}
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}

/* ── Premium Order Card ── */
.premium-order-card {
  background: linear-gradient(145deg, rgba(18,12,30,0.95), rgba(14,10,24,0.98));
  border: 1px solid rgba(123,46,255,0.18);
  border-radius: 20px;
  padding: 22px 24px;
  margin-bottom: 16px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
}
.premium-order-card:hover {
  border-color: rgba(123,46,255,0.35);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(123,46,255,0.15);
  transform: translateY(-1px);
}
.premium-order-card:active { transform: scale(0.99); }

/* Ripple */
@keyframes rippleAnim {
  from { transform: scale(0); opacity: 1; }
  to   { transform: scale(4); opacity: 0; }
}

/* Print invoice clean */
@media print {
  body > *:not(#inv-printable):not(#pinv-ov) { display: none !important; }
  #inv-printable { border: none !important; box-shadow: none !important; background: #fff !important; color: #000 !important; }
  #inv-printable * { color: #000 !important; border-color: #ddd !important; }
  .btn { display: none !important; }
}

/* ══════════════════════════════════════════════
   NAVBAR — Top
══════════════════════════════════════════════ */
#navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: 64px; display: flex; align-items: center; gap: 12px; padding: 0 20px;
  background: rgba(10,0,20,0.65);
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border-bottom: 1px solid rgba(123,46,255,0.2);
  box-shadow: 0 4px 32px rgba(0,0,0,0.3);
  transition: all 0.3s ease;
}
[data-theme="light"] #navbar {
  background: rgba(245,238,255,0.8);
  border-bottom-color: rgba(123,46,255,0.15);
}
.nav-logo { display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;text-decoration:none; }
.nav-logo img { width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(123,46,255,0.4); }
.nav-logo-text { font-family:var(--font-script);font-size:1.4rem;background:linear-gradient(135deg,var(--neon-purple),var(--neon-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap; }

.nav-search { flex:1;max-width:480px;position:relative; }
.nav-search input {
  width:100%;padding:9px 16px 9px 40px;
  background:rgba(123,46,255,0.08);border:1px solid rgba(123,46,255,0.2);
  border-radius:50px;color:var(--text-primary);font-family:var(--font-body);font-size:0.875rem;outline:none;
  transition:all 0.3s;
}
.nav-search input:focus { border-color:var(--neon-purple);background:rgba(123,46,255,0.14);box-shadow:0 0 0 3px rgba(123,46,255,0.15); }
.nav-search input::placeholder { color:var(--text-muted); }
.nav-search-icon { position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:0.85rem;color:var(--text-muted);pointer-events:none; }
.search-dropdown {
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--bg-mid);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:8px;max-height:300px;overflow-y:auto;z-index:200;
  box-shadow:0 16px 40px rgba(0,0,0,0.4);
}
.search-item { display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.2s; }
.search-item:hover { background:var(--glass-hover); }
.search-item-img { width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0; }
.search-item-name { font-size:0.85rem;font-weight:600;color:var(--text-primary); }
.search-item-price { font-size:0.78rem;color:var(--neon-cyan); }

.nav-actions { display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0; }
.nav-icon-btn {
  position:relative;width:38px;height:38px;border-radius:50%;
  background:rgba(123,46,255,0.1);border:1px solid rgba(123,46,255,0.2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.95rem;
  color:var(--text-primary);transition:all 0.2s;text-decoration:none;
}
.nav-icon-btn:hover { background:rgba(123,46,255,0.2);border-color:var(--neon-purple);box-shadow:0 0 16px rgba(123,46,255,0.3);transform:translateY(-1px); }
#cart-badge {
  position:absolute;top:-4px;right:-4px;background:var(--neon-pink);color:#fff;
  font-size:0.6rem;font-weight:700;width:17px;height:17px;border-radius:50%;
  display:none;align-items:center;justify-content:center;box-shadow:0 0 8px rgba(255,46,189,0.6);
}
.theme-toggle {
  width:46px;height:26px;border-radius:50px;cursor:pointer;position:relative;
  background:rgba(123,46,255,0.15);border:1px solid rgba(123,46,255,0.25);transition:all 0.3s;
  flex-shrink:0;
}
.theme-toggle::after {
  content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-cyan));
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 8px rgba(123,46,255,0.5);
}
[data-theme="light"] .theme-toggle::after { transform:translateX(20px); }
.nav-avatar {
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-cyan));
  display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;
  color:#fff;cursor:pointer;border:2px solid transparent;transition:all 0.2s;
}
.nav-avatar:hover { border-color:var(--neon-cyan);box-shadow:0 0 16px rgba(0,245,255,0.4);transform:translateY(-1px); }
.nav-dropdown {
  position:absolute;top:calc(100% + 10px);right:0;
  background:var(--bg-mid);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:6px;min-width:190px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5),var(--shadow-purple);
  animation:slideUp 0.2s ease;z-index:300;
}
.nav-dropdown-item {
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:0.85rem;color:var(--text-primary);transition:background 0.15s;
}
.nav-dropdown-item:hover { background:var(--glass-hover);color:var(--neon-purple-light); }
.nav-dropdown-item.danger { color:var(--neon-pink); }
.nav-avatar-wrap { position:relative; }

/* ══════════════════════════════════════════════
   BOTTOM NAV — Premium Glassmorphism Pill Style
══════════════════════════════════════════════ */
#bottom-nav {
  display: none;
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 890;
  background: rgba(15,0,35,0.75);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border: 1px solid rgba(123,46,255,0.35);
  border-radius: 50px;
  padding: 8px 12px;
  gap: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(123,46,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  min-width: 320px; max-width: 94vw;
  justify-content: space-around; align-items: center;
  animation: navSlideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes navSlideUp { from { transform:translateX(-50%) translateY(80px);opacity:0; } to { transform:translateX(-50%) translateY(0);opacity:1; } }
[data-theme="light"] #bottom-nav {
  background: rgba(240,232,255,0.85);
  border-color: rgba(123,46,255,0.25);
  box-shadow: 0 8px 32px rgba(123,46,255,0.15);
}
@media (max-width: 768px) {
  #bottom-nav { display: flex; }
  .home-page, .dashboard-page, .product-page { padding-bottom: 96px !important; }
  .auth-page { padding-bottom: 20px !important; }
}

.bn-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; padding: 8px 14px; border-radius: 40px;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; min-width: 52px; flex: 1;
  border: 1px solid transparent;
}
.bn-item:hover { background: rgba(123,46,255,0.12); transform: translateY(-2px); }
.bn-item.bn-active {
  background: linear-gradient(135deg, rgba(123,46,255,0.3), rgba(0,245,255,0.15));
  border-color: rgba(123,46,255,0.4);
  box-shadow: 0 0 20px rgba(123,46,255,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  transform: translateY(-2px);
}
.bn-item.bn-active .bn-icon { filter: drop-shadow(0 0 6px rgba(123,46,255,0.8)); transform: scale(1.15); }
.bn-item.bn-active .bn-label { color: var(--neon-purple-light); font-weight: 700; }
.bn-icon { font-size: 1.25rem; line-height: 1; transition: all 0.25s; }
.bn-label { font-size: 0.6rem; font-weight: 600; color: rgba(240,230,255,0.5); letter-spacing: 0.04em; transition: color 0.2s; white-space: nowrap; }
[data-theme="light"] .bn-label { color: rgba(26,0,64,0.5); }
[data-theme="light"] .bn-item.bn-active .bn-label { color: var(--neon-purple); }
.bn-badge {
  position: absolute; top: 4px; right: 8px;
  background: var(--neon-pink); color: #fff;
  font-size: 0.55rem; font-weight: 700; width: 15px; height: 15px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 0 8px rgba(255,46,189,0.7);
}

@media (max-width: 380px) {
  #bottom-nav { min-width: 98vw; bottom: 8px; padding: 6px 8px; }
  .bn-item { padding: 7px 10px; min-width: 44px; }
  .bn-label { font-size: 0.55rem; }
}

/* ── AUTH PAGES ── */
.auth-page {
  min-height: 100vh; display: flex;
  padding-top: 64px;
}

.auth-left {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 40px;
  display: none;
}

@media (min-width: 900px) {
  .auth-left { display: flex; }
}

.auth-illustration {
  max-width: 420px; text-align: center;
}
.auth-mascot {
  width: 260px; height: 260px; margin: 0 auto 28px;
  border-radius: 50%; overflow: hidden;
  border: 3px solid transparent;
  background: linear-gradient(var(--bg-mid), var(--bg-mid)) padding-box,
    linear-gradient(135deg, var(--neon-purple), var(--neon-cyan), var(--neon-pink)) border-box;
  box-shadow:
    0 0 40px rgba(123,46,255,0.4),
    0 0 80px rgba(0,245,255,0.2),
    inset 0 0 30px rgba(123,46,255,0.15);
  animation: floatMascot 4s ease-in-out infinite;
  display: flex; align-items: center; justify-content: center;
}
.auth-mascot img {
  width: 100%; height: 100%; object-fit: cover;
  filter: hue-rotate(0deg) saturate(1.2) brightness(1.1);
}

/* Recolor the wolf mascot to match site theme */
.auth-mascot-placeholder {
  font-size: 8rem; line-height: 1;
}

@keyframes floatMascot {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-16px) rotate(1deg); }
}

.auth-illustration h2 {
  font-family: var(--font-display); font-size: 2rem; font-weight: 700;
  margin-bottom: 14px;
}
.auth-illustration p {
  color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7;
}

.auth-features { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; text-align: left; }
.auth-feature {
  display: flex; align-items: center; gap: 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 12px 16px;
  font-size: 0.875rem;
}
.auth-feature-icon { font-size: 1.3rem; flex-shrink: 0; }

.auth-right {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 24px;
  max-width: 520px;
}

@media (max-width: 899px) { .auth-right { max-width: 100%; } }

.auth-card {
  width: 100%; max-width: 460px;
  background: var(--glass); backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 40px 36px;
  animation: pageIn 0.5s ease;
}

@media (max-width: 480px) { .auth-card { padding: 28px 20px; } }

.auth-header { text-align: center; margin-bottom: 32px; }
.auth-header h1 {
  font-family: var(--font-display); font-size: 2rem; font-weight: 900;
  margin-bottom: 6px;
}
.auth-header p { font-size: 0.875rem; color: var(--text-secondary); }

.auth-tabs {
  display: flex; gap: 0; background: var(--glass);
  border: 1px solid var(--glass-border); border-radius: 50px;
  padding: 4px; margin-bottom: 28px;
}
.auth-tab {
  flex: 1; text-align: center; padding: 10px 16px;
  border-radius: 50px; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; transition: var(--transition); color: var(--text-muted);
  border: none; background: transparent; font-family: var(--font-body);
}
.auth-tab.active {
  background: linear-gradient(135deg, var(--neon-purple), #5B0FCC);
  color: #fff; box-shadow: 0 4px 16px rgba(123,46,255,0.4);
}

.social-divider { margin: 20px 0; }

.remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.remember-row label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; color: var(--text-secondary); }
.remember-row a { font-size: 0.85rem; color: var(--neon-purple-light); text-decoration: none; }
.remember-row a:hover { text-decoration: underline; }

/* Custom checkbox */
input[type="checkbox"] {
  appearance: none; width: 16px; height: 16px;
  border: 1.5px solid var(--glass-border); border-radius: 4px;
  background: var(--glass); cursor: pointer; position: relative;
  transition: var(--transition); flex-shrink: 0;
}
input[type="checkbox"]:checked {
  background: var(--neon-purple); border-color: var(--neon-purple);
}
input[type="checkbox"]:checked::after {
  content: '✓'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.7rem; font-weight: 700;
}

.auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
.auth-footer a { color: var(--neon-purple-light); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

/* Password strength */
.password-strength { margin-top: 6px; }
.strength-bar { height: 4px; border-radius: 2px; background: var(--glass); overflow: hidden; margin-bottom: 4px; }
.strength-fill { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.4s; }
.strength-label { font-size: 0.75rem; color: var(--text-muted); }

/* Referral badge on signup */
.referral-notice {
  display: flex; align-items: center; gap: 10px;
  background: rgba(0,245,255,0.08); border: 1px solid rgba(0,245,255,0.3);
  border-radius: var(--radius-sm); padding: 12px 16px;
  margin-bottom: 20px; font-size: 0.85rem; color: var(--neon-cyan);
}

/* Welcome typing headline */
.auth-welcome-headline {
  font-family: var(--font-script); font-size: 1.8rem;
  margin-bottom: 8px; min-height: 44px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── HOME PAGE ── */
.home-page { padding-top: 64px; }

/* Hero */
.hero {
  min-height: 85vh; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 60px 24px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(123,46,255,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 30% 70%, rgba(0,245,255,0.1) 0%, transparent 60%);
  animation: heroGlow 6s ease-in-out infinite alternate;
}
@keyframes heroGlow {
  0% { opacity: 0.7; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.05); }
}

.hero-content { position: relative; max-width: 780px; }

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(123,46,255,0.15); border: 1px solid rgba(123,46,255,0.3);
  border-radius: 50px; padding: 6px 18px; font-size: 0.8rem; font-weight: 600;
  color: var(--neon-purple-light); letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 24px; animation: fadeIn 0.6s ease;
}

.hero-title {
  font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 5.5rem);
  font-weight: 900; line-height: 1.05; margin-bottom: 20px;
  animation: pageIn 0.7s ease 0.1s both;
}
.hero-title .italic-accent { font-style: italic; }

.hero-subtitle {
  font-size: clamp(1rem, 2vw, 1.15rem); color: var(--text-secondary);
  max-width: 520px; margin: 0 auto 36px; line-height: 1.7;
  animation: pageIn 0.7s ease 0.2s both;
}

.hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  animation: pageIn 0.7s ease 0.3s both;
}

.hero-stats {
  display: flex; gap: 40px; justify-content: center;
  margin-top: 48px; animation: pageIn 0.7s ease 0.4s both;
}
.hero-stat { text-align: center; }
.hero-stat-num {
  font-family: var(--font-display); font-size: 2rem; font-weight: 700;
  color: var(--text-primary);
}
.hero-stat-label { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.05em; }

/* Flash Sale Banner */
.flash-banner {
  background: linear-gradient(135deg, rgba(255,46,189,0.15), rgba(123,46,255,0.15));
  border-top: 1px solid rgba(255,46,189,0.2);
  border-bottom: 1px solid rgba(255,46,189,0.2);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}
.flash-banner-label {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 1rem;
}
.flash-fire { font-size: 1.4rem; animation: bounce 0.5s ease infinite alternate; }
@keyframes bounce { to { transform: translateY(-4px); } }

/* Category Pills */
.category-section { padding: 48px 24px; }
.category-pills {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.category-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50px; padding: 10px 20px;
  cursor: pointer; font-size: 0.875rem; font-weight: 600;
  transition: var(--transition); color: var(--text-primary);
}
.category-pill:hover, .category-pill.active {
  background: var(--glass-hover); border-color: var(--neon-purple);
  color: var(--neon-purple-light); box-shadow: var(--shadow-purple);
  transform: translateY(-2px);
}

/* Products Section */
.products-section { padding: 20px 24px 48px; }

/* Product Card */
.product-card {
  background: var(--glass); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  overflow: hidden; cursor: pointer; transition: var(--transition);
  position: relative;
}
.product-card:hover {
  border-color: var(--neon-purple); box-shadow: var(--shadow-purple);
  transform: translateY(-6px);
}
.product-card:hover .product-img-overlay { opacity: 1; }
.product-card:hover .product-img { transform: scale(1.08); }

.product-img-wrap {
  position: relative; aspect-ratio: 1; overflow: hidden;
  background: rgba(123,46,255,0.08);
}
.product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
.product-img-overlay {
  position: absolute; inset: 0; background: rgba(123,46,255,0.2);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  opacity: 0; transition: var(--transition);
}
.product-badges {
  position: absolute; top: 10px; left: 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.product-wishlist {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.9rem; transition: var(--transition);
}
.product-wishlist:hover { background: rgba(255,46,189,0.2); border-color: var(--neon-pink); }
.product-wishlist.active { color: var(--neon-pink); }

.product-info { padding: 14px; }
.product-name {
  font-weight: 700; font-size: 0.875rem; margin-bottom: 4px;
  color: var(--text-primary); line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.product-price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.product-stock { font-size: 0.72rem; color: var(--neon-pink); font-weight: 600; }
.product-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
.product-rating-count { font-size: 0.75rem; color: var(--text-muted); }
.product-add-btn {
  width: 100%; padding: 10px;
  background: linear-gradient(135deg, rgba(123,46,255,0.15), rgba(0,245,255,0.1));
  border: 1px solid rgba(123,46,255,0.3);
  border-radius: var(--radius-sm); color: var(--neon-purple-light);
  font-family: var(--font-body); font-size: 0.8rem; font-weight: 700;
  cursor: pointer; transition: var(--transition);
}
.product-add-btn:hover {
  background: var(--neon-purple); color: #fff; box-shadow: var(--shadow-purple);
}

/* Marquee scroll */
.marquee-wrap { overflow: hidden; padding: 20px 0; }
.marquee { display: flex; gap: 16px; animation: marquee 20s linear infinite; white-space: nowrap; }
.marquee:hover { animation-play-state: paused; }
@keyframes marquee { to { transform: translateX(-50%); } }
.marquee-item {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50px; padding: 8px 20px; font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary); flex-shrink: 0;
}

/* Referral Banner */
.referral-cta {
  margin: 40px 24px; padding: 40px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(123,46,255,0.15), rgba(0,245,255,0.1));
  border: 1px solid rgba(123,46,255,0.25);
  text-align: center; position: relative; overflow: hidden;
}
.referral-cta::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,245,255,0.1) 0%, transparent 70%);
}
.referral-cta h2 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 12px; }
.referral-cta p { color: var(--text-secondary); max-width: 500px; margin: 0 auto 24px; }

/* ── PRODUCT PAGE ── */
.product-page { padding-top: 80px; padding-bottom: 60px; }

.product-breadcrumb {
  font-size: 0.8rem; color: var(--text-muted); margin-bottom: 28px;
  display: flex; align-items: center; gap: 6px;
}
.product-breadcrumb span { cursor: pointer; }
.product-breadcrumb span:hover { color: var(--neon-purple-light); }

.product-detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start;
}
@media (max-width: 768px) {
  .product-detail-grid { grid-template-columns: 1fr; gap: 28px; }
}

/* Gallery */
.product-gallery { position: relative; }
.product-main-img-wrap {
  border-radius: var(--radius); overflow: hidden; aspect-ratio: 1;
  background: var(--glass); cursor: zoom-in; position: relative;
  border: 1px solid var(--glass-border);
}
.product-main-img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.product-main-img-wrap:hover .product-main-img { transform: scale(1.1); }

.product-thumbnails { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.product-thumb {
  width: 72px; height: 72px; border-radius: var(--radius-sm);
  object-fit: cover; cursor: pointer; border: 2px solid var(--glass-border);
  transition: var(--transition);
}
.product-thumb:hover, .product-thumb.active { border-color: var(--neon-purple); box-shadow: var(--shadow-purple); }

/* Product Info */
.product-detail-info {}
.product-detail-name {
  font-family: var(--font-display); font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 800; margin-bottom: 12px; line-height: 1.2;
}

.product-detail-price-row {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
}
.price-big { font-size: 2rem; font-weight: 800; color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0,245,255,0.5); }

.product-detail-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.product-detail-rating .stars { font-size: 1rem; }

/* Qty Selector */
.qty-selector { display: flex; align-items: center; gap: 0; margin-bottom: 20px; }
.qty-btn {
  width: 40px; height: 40px; background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-primary); font-size: 1.2rem; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-body);
}
.qty-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
.qty-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.qty-btn:hover { background: var(--glass-hover); }
.qty-display {
  min-width: 50px; height: 40px; background: var(--glass); border-top: 1px solid var(--glass-border);
  border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;

function animatePlaceholder(input, phrases, speed = 80) {
  let pi = 0, ci = 0, deleting = false;
  function type() {
    const phrase = phrases[pi];

      input.setAttribute('placeholder', phrase.slice(0, ++ci));
      if (ci === phrase.length) { deleting = true; setTimeout(type, 1400); return; }
    } else {
      input.setAttribute('placeholder', phrase.slice(0, --ci));

    setTimeout(type, deleting ? 40 : speed);
  }
  type();
}

    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);

  });
  children.forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;

      if (!uid) { this.user=null; this.profile=null; return null; }
      var res = await db.from('profiles').select('*').eq('id', uid).single();
      if (res.error || !res.data) { sessionStorage.removeItem('rae_uid'); this.user=null; this.profile=null; return null; }
      this.user = res.data; this.profile = res.data;
      await this.loadCart();
      return res.data;
    } catch(e) { this.user=null; this.profile=null; return null; }
  },

  logout() {
    sessionStorage.removeItem('rae_uid');
    this.user=null; this.profile=null; this.cart=[]; this.cartCount=0;
    this.updateCartBadge();
  },

  async loadCart() {
    if (!this.user) { this.cart=[]; return; }
    try { var s=localStorage.getItem('rc_'+this.user.id); this.cart=s?JSON.parse(s):[]; } catch(e){this.cart=[];}
    this.cartCount=this.cart.reduce(function(a,i){return a+i.qty;},0);
    this.updateCartBadge();
  },

  saveCart() {
    if (!this.user) return;
    try{localStorage.setItem('rc_'+this.user.id,JSON.stringify(this.cart));}catch(e){}
    this.cartCount=this.cart.reduce(function(a,i){return a+i.qty;},0);
    this.updateCartBadge();
  },

  addToCart(p) {
    var f=null; for(var i=0;i<this.cart.length;i++){if(this.cart[i].id===p.id){f=this.cart[i];break;}}
    if(f){f.qty+=1;}else{var o={}; for(var k in p)o[k]=p[k]; o.qty=1; this.cart.push(o);}
    this.saveCart(); toast((p.name||'Item')+' added! 🛒');
  },

  removeFromCart(id){this.cart=this.cart.filter(function(i){return i.id!==id;});this.saveCart();},

  updateQty(id,qty){
    if(qty<=0){this.removeFromCart(id);return;}
    for(var i=0;i<this.cart.length;i++){if(this.cart[i].id===id){this.cart[i].qty=qty;break;}}
    this.saveCart();
  },

  getCartTotal(){return this.cart.reduce(function(a,i){return a+(i.discount_price||i.price||0)*i.qty;},0);},
  clearCart(){this.cart=[];this.saveCart();},

  updateCartBadge(){
    var b=document.getElementById('cart-badge');
    if(b){b.textContent=this.cartCount;b.style.display=this.cartCount===0?'none':'flex';}
  },

  isAdmin(){return !!(this.profile&&this.profile.role==='admin');}
};

var SYNONYMS = {
  airpod:'earbuds', airpods:'earbuds', headphone:'earbuds', earbud:'earbuds',
  purse:'handbag', clutch:'handbag', tote:'handbag', sneaker:'shoes', trainer:'shoes',

  phone:'tech', laptop:'tech', gadget:'tech', ring:'accessories', bracelet:'accessories',
  necklace:'accessories', earring:'accessories', perfume:'beauty', fragrance:'beauty'
};

async function smartSearch(q, sd) {
  q = (q || '').trim();
  if (q.length < 2) { sd.classList.add('hidden'); return; }
  var searchTerm = q.toLowerCase();
  for (var key in SYNONYMS) {
    if (searchTerm.indexOf(key) !== -1) { searchTerm = SYNONYMS[key]; break; }
  }
  var r1 = await db.from('products').select('id,name,price,discount_price,images,category').ilike('name', '%' + q + '%').limit(4);
  var r2 = await db.from('products').select('id,name,price,discount_price,images,category').ilike('category', '%' + searchTerm + '%').limit(4);
  var seen = {};
  var combined = [];
  [].concat(r1.data||[], r2.data||[]).forEach(function(p) {
    if (!seen[p.id]) { seen[p.id] = true; combined.push(p); }
  });
  combined = combined.slice(0, 6);
  if (!combined.length) { sd.classList.add('hidden'); return; }
  sd.innerHTML = combined.map(function(p) {
    return '<div class="search-item" onclick="navigate(\'product\',{id:\'' + p.id + '\'})">' +
      '<img class="search-item-img" src="' + ((p.images&&p.images[0])||'') + '" onerror="this.src=\'https://placehold.co/36x36/7B2EFF/fff?text=R\'" />' +
      '<div><div class="search-item-name">' + p.name + '</div>' +
      '<div class="search-item-price">' + formatNaira(p.discount_price||p.price) + '</div></div></div>';
  }).join('');
  sd.classList.remove('hidden');
}

// RAE ENTERPRISE — Auth
// Username + password against profiles table
// Password protected with SHA-256 (Web Crypto — works in all browsers)

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){ return ('00'+b.toString(16)).slice(-2); }).join('');
}

// ── REGISTER ─────────────────────────────────────────
async function doRegister(e) {
  e.preventDefault();
  var btn      = document.getElementById('r-btn');
  var username = (document.getElementById('r-user').value  || '').trim();
  var email    = (document.getElementById('r-email').value || '').trim().toLowerCase();
  var phone    = (document.getElementById('r-phone').value || '').trim();
  var password = (document.getElementById('r-pw').value    || '').trim();
  var refBy    = (document.getElementById('r-ref').value   || '').trim();

  if (!username || !email || !phone || !password) {
    toast('Please fill all fields 💔', 'error'); return;
  }

  setLoading(btn, true);

  try {
    // Check username not taken
    var uChk = await db.from('profiles').select('id').eq('username', username);
    if (uChk.data && uChk.data.length > 0) {
      toast('Username taken — try another 💔', 'error');
      setLoading(btn, false); return;
    }

    // Check email not taken
    var eChk = await db.from('profiles').select('id').eq('email', email);
    if (eChk.data && eChk.data.length > 0) {
      toast('Email already registered — please sign in 💜', 'warn');
      setLoading(btn, false); renderAuth('login'); return;
    }

    // Hash password with SHA-256
    var hashed = await sha256(password);

    // Insert user
    var ins = await db.from('profiles').insert({
      username:       username,
      email:          email,
      phone:          phone,
      password:       hashed,
      referred_by:    refBy || null,
      role:           'user',
      wallet_balance: 0,
      total_spent:    0,

    }).select().single();

    if (ins.error || !ins.data) {

      } else {

      }
      setLoading(btn, false); return;
    }

    if (refBy) {
      try {

        if (rr.data) await db.from('profiles').update({ referral_count: (rr.data.referral_count||0)+1 }).eq('id', rr.data.id);

// ── LOGIN ─────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  var btn      = document.getElementById('l-btn');
  var username = (document.getElementById('l-user').value || '').trim();
  var password = (document.getElementById('l-pw').value   || '').trim();

  if (!username || !password) {
    toast('Enter username and password 💔', 'error'); return;
  }

  setLoading(btn, true);

  try {
    // Hash the entered password
    var hashed = await sha256(password);

    // Check username exists first
    var uRes = await db.from('profiles').select('id,password').eq('username', username).single();

    if (uRes.error || !uRes.data) {
      toast('Username not found 💔 Please register first.', 'error');
      setLoading(btn, false); return;
    }

    // Compare hashed passwords
    if (uRes.data.password !== hashed) {
      toast('Wrong password 💔 Please try again.', 'error');
      setLoading(btn, false); return;
    }

    // Fetch full profile
    var full = await db.from('profiles').select('*').eq('username', username).single();
    Store.user = full.data; Store.profile = full.data;
    sessionStorage.setItem('rae_uid', full.data.id);
    await Store.loadCart();
    renderNavbar();
    setLoading(btn, false);
    if (username === 'Chinedu') { adminAuthed = true; try { sessionStorage.setItem('rae_admin','1'); } catch(ex){} }
    toast(username === 'Chinedu' ? 'Welcome Admin Chinedu! ⚙️' : 'Welcome back, gorgeous! 💜');
    navigate('home');

  } catch(err) {
    setLoading(btn, false);
    toast('Error: ' + (err.message || 'unknown'), 'error');
    console.error(err);
  }
}

  var query = db.from('products').select('*').eq('in_stock', true);
  if (homeCategory !== 'All') query = query.eq('category', homeCategory);
  if (sort === 'price-asc')  query = query.order('discount_price', {ascending:true});
  else if (sort === 'price-desc') query = query.order('discount_price', {ascending:false});
  else query = query.order('created_at', {ascending:false});
  query = query.range(productsOffset, productsOffset + 11);

  var res = await query;
  var data = res.data || [];

  if (reset) grid.innerHTML = '';

      '<div class="countdown-unit"><span class="countdown-num">'+String(h).padStart(2,'0')+'</span><span class="countdown-label">Hrs</span></div>' +

      '<div class="countdown-unit"><span class="countdown-num">'+String(s).padStart(2,'0')+'</span><span class="countdown-label">Sec</span></div>';

function goImg(i) {
  var p = currentProduct;
  if (!p || !p.images || !p.images.length) return;
  galleryIndex = Math.max(0, Math.min(i, p.images.length - 1));
  var main = document.getElementById('main-img');
  if (main) { main.style.opacity = '0'; setTimeout(function() { main.src = p.images[galleryIndex]; main.style.opacity = '1'; }, 150); }
  document.querySelectorAll('.product-thumb').forEach(function(t, idx) {
    t.style.borderColor = idx === galleryIndex ? 'var(--neon-purple)' : 'var(--glass-border)';
  });
  var dots = document.querySelectorAll('#img-dots div');
  dots.forEach(function(d, idx) { d.style.background = idx === galleryIndex ? '#7B2EFF' : 'rgba(255,255,255,0.4)'; });
}
function nextImg() { if (!currentProduct || !currentProduct.images) return; goImg(galleryIndex + 1 >= currentProduct.images.length ? 0 : galleryIndex + 1); }
function prevImg() { if (!currentProduct || !currentProduct.images) return; goImg(galleryIndex - 1 < 0 ? currentProduct.images.length - 1 : galleryIndex - 1); }
function touchStart(e) { touchStartX = e.changedTouches[0].screenX; }
function touchEnd(e) { var diff = touchStartX - e.changedTouches[0].screenX; if (Math.abs(diff) > 40) { diff > 0 ? nextImg() : prevImg(); } }

function selectSize(s) {
  currentSize = s;
  document.querySelectorAll('.size-btn').forEach(function(b) {
    var isActive = b.id === 'sz-' + s;
    b.style.borderColor = isActive ? '#7B2EFF' : 'var(--glass-border)';
    b.style.background  = isActive ? 'rgba(123,46,255,0.2)' : 'var(--glass)';
    b.style.color       = isActive ? '#9D5FFF' : 'var(--text-primary)';
    b.style.boxShadow   = isActive ? '0 0 14px rgba(123,46,255,0.4)' : 'none';
    b.style.transform   = isActive ? 'scale(1.05)' : 'scale(1)';
  });
}

function changeQty(d) {
  currentQty = Math.max(1, currentQty + d);
  var el = document.getElementById('qty-d'); if (el) el.textContent = currentQty;
}

function addToCartProduct() {
  if (!Store.user) { toast('Please sign in to add to cart \ud83d\udc9c', 'warn'); navigate('login'); return; }
  if (!currentProduct) return;
  var needsSize = currentProduct.category === 'Fashion' || currentProduct.category === 'Shoes' ||
    currentProduct.category === 'Accessories' || currentProduct.category === 'Clothing' || currentProduct.category === 'Kids';
  if (needsSize && !currentSize) { toast('Please select a size first \ud83d\udc94', 'warn'); return; }
  var item = {};
  for (var k in currentProduct) item[k] = currentProduct[k];
  if (currentSize) item.selected_size = currentSize;
  for (var i = 0; i < currentQty; i++) Store.addToCart(item);
}

function buyNow() { addToCartProduct(); if (Store.cart && Store.cart.length) navigate('cart'); }

async function requestItem(productId, productName) {
  if (!Store.user) { toast('Please sign in to request items \ud83d\udc9c', 'warn'); navigate('login'); return; }
  var btn = event.target;
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    var existing = await db.from('item_requests').select('id,count').eq('product_id', productId).eq('user_id', Store.user.id).single();
    if (existing.data) {
      await db.from('item_requests').update({ count: (existing.data.count || 1) + 1, updated_at: new Date().toISOString() }).eq('id', existing.data.id);
    } else {
      await db.from('item_requests').insert({
        product_id: productId, product_name: productName,
        user_id: Store.user.id, username: (Store.profile && Store.profile.username) || 'Unknown',
        count: 1, created_at: new Date().toISOString(), updated_at: new Date().toISOString()
      });
    }
    btn.textContent = '\u2705 Requested!';
    btn.style.background = 'rgba(0,245,255,0.1)';
    btn.style.borderColor = 'var(--neon-cyan)';
    btn.style.color = 'var(--neon-cyan)';
    toast('Request sent! We\'ll notify you when it\'s back in stock \ud83d\udc9c');
  } catch(e) {
    btn.disabled = false; btn.textContent = '\ud83d\udce3 Request Item';
    toast('Error sending request. Try again \ud83d\udc94', 'error');
  }
}

async function loadRelated(category, excludeId) {
  var res = await db.from('products').select('*').eq('category', category).neq('id', excludeId).limit(4);
  var grid = document.getElementById('related-grid'); if (!grid) return;
  if (!res.data || !res.data.length) { grid.innerHTML = '<div style="color:var(--text-muted)">No related products</div>'; return; }
  grid.innerHTML = res.data.map(function(p) { return productCardHTML(p); }).join('');
}

  overlay.addEventListener('click', function(e) { if(e.target===overlay) overlay.remove(); });
  window._savedAddrsForCheckout = savedAddrs;
}

function getDefaultAddress() {
  if (!Store.user) return '';
  try {
    var addrs = JSON.parse(localStorage.getItem('rae_addr_' + Store.user.id) || '[]');
    if (addrs.length) return addrs[0].street + ', ' + addrs[0].city + ', ' + addrs[0].state;
  } catch(e) {}
  return '';
}

function fillSavedAddr(idx) {
  if (!window._savedAddrsForCheckout || idx === '') return;
  var a = window._savedAddrsForCheckout[parseInt(idx)];
  if (!a) return;
  var nameEl = document.getElementById('order-name');
  var addrEl = document.getElementById('order-address');
  var phoneEl = document.getElementById('order-phone');
  if (nameEl) nameEl.value = a.name;
  if (addrEl) addrEl.value = a.street + ', ' + a.city + ', ' + a.state;
  if (phoneEl && a.phone) phoneEl.value = a.phone;
}

async function submitOrder(e) {
  e.preventDefault();
  var btn = document.getElementById('submit-order-btn');
  setLoading(btn, true);

  var proofFile = document.getElementById('order-proof').files[0];
  var proofUrl = null;

  if (proofFile) {
    try {
      var fileName = 'proofs/' + Store.user.id + '/' + Date.now() + '_' + proofFile.name.replace(/[^a-zA-Z0-9.]/g,'_');
      var uploadData = await db.storage.from('order-proofs').upload(fileName, proofFile);
      if (!uploadData.error) {
        var urlData = db.storage.from('order-proofs').getPublicUrl(fileName);
        proofUrl = urlData.data ? urlData.data.publicUrl : null;
      }
    } catch(uploadErr) { console.warn('proof upload failed:', uploadErr); }
  }

  var orderId = generateOrderId();
  var total = Store.getCartTotal();

  var orderData = {
    id:          orderId,
    user_id:     Store.user.id,
    items:       Store.cart,
    total_amount:total,
    full_name:   document.getElementById('order-name').value,
    address:     document.getElementById('order-address').value,
    phone:        document.getElementById('order-phone').value,
    sender_name: document.getElementById('order-sender').value,
    proof_url:   proofUrl,
    status:      'awaiting_approval',
    created_at:  new Date().toISOString(),
  };

  var result = await db.from('orders').insert(orderData);

  if (result.error) {
    toast('Error submitting order: ' + result.error.message, 'error');
    setLoading(btn, false);
    return;
  }

  // Check referral rewards
  await checkReferralRewards(total);

  Store.clearCart();
  document.getElementById('checkout-overlay').remove();
  setLoading(btn, false);
  toast('Order ' + orderId + ' submitted! Awaiting approval.');
  navigate('orders');
}

async function checkoutWithWallet() {
  var total = Store.getCartTotal();
  if (total < 7000) {
    toast('Minimum order is N7,000. Add ' + formatNaira(7000 - total) + ' more!', 'warn');
    return;
  }
  var balance = Store.profile ? (Store.profile.wallet_balance || 0) : 0;
  if (balance < total) { toast('Insufficient wallet balance', 'error'); return; }

  var orderId = generateOrderId();
  await db.from('orders').insert({
    id:          orderId,
    user_id:     Store.user.id,
    items:       Store.cart,
    total_amount:total,
    full_name:   Store.profile.username || '',
    address:     getDefaultAddress(),
    phone:        Store.profile.phone || '',
    status:      'approved',
    payment_method: 'wallet',
    created_at:  new Date().toISOString(),
  });

  // Deduct wallet + update total_spent
  var newBalance = balance - total;
  var currentSpent = Store.profile.total_spent || 0;
  await db.from('profiles').update({
    wallet_balance: newBalance,
    total_spent: currentSpent + total
  }).eq('id', Store.user.id);

  Store.profile.wallet_balance = newBalance;
  Store.profile.total_spent = currentSpent + total;
  Store.clearCart();
  toast('Order placed! Paid from wallet.');
  navigate('orders');
}

async function checkReferralRewards(orderTotal) {
  if (!Store.profile || !Store.profile.referred_by) return;
  var reward = 0;
  if (orderTotal >= 100000) reward = 10000;
  else if (orderTotal >= 10000) reward = 1000;
  if (reward > 0) {
    try {
      var refRes = await db.from('profiles').select('id,wallet_balance').eq('username', Store.profile.referred_by).single();
      if (refRes.data) {
        await db.from('profiles').update({ wallet_balance: (refRes.data.wallet_balance || 0) + reward }).eq('id', refRes.data.id);
        await db.from('notifications').insert({
          user_id: refRes.data.id,
          message: 'You earned ' + formatNaira(reward) + ' referral reward!',
          type: 'reward',
          created_at: new Date().toISOString()
        });
      }
    } catch(e) {}
  }
}

var ORDER_STEPS = [
  { key:'awaiting_approval', label:'Payment Confirming', short:'Confirming', pct:10  },
  { key:'approved',          label:'Preparing Order',   short:'Preparing',  pct:30  },
  { key:'processing',        label:'Packaged',          short:'Packaged',   pct:55  },
  { key:'shipped',           label:'On the Way',        short:'On the Way', pct:80  },
  { key:'delivered',         label:'Delivered',         short:'Delivered',  pct:100 },
];

function getStepIndex(status) {
  if (status === 'cancelled') return -1;
  for (var i=0; i<ORDER_STEPS.length; i++) { if (ORDER_STEPS[i].key===status) return i; }
  return 0;
}

function getLevel(spent) {
  if (spent>=100000) return {name:'Gold',   icon:'Gold',   class:'level-gold'  };

function sCard(val, label, cls) {
  return '<div class="stat-card"><div class="stat-card-value ' + cls + '">' + val + '</div><div class="stat-card-label">' + label + '</div></div>';
}

function renderLevelProgress(spent) {
  var tiers = [{name:'Bronze',min:0,max:30000,cls:'level-bronze'},{name:'Silver',min:30000,max:100000,cls:'level-silver'},{name:'Gold',min:100000,max:Infinity,cls:'level-gold'}];
  var curIdx=0; for(var i=0;i<tiers.length;i++){if(spent>=tiers[i].min)curIdx=i;}
  var cur=tiers[curIdx], next=tiers[curIdx+1];
  var pct=next?Math.min(100,Math.round(((spent-cur.min)/(next.min-cur.min))*100)):100;
  return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">' +
    tiers.map(function(t,i){ return (i>0?'<div style="color:var(--text-muted)">&#8594;</div>':'')+
      '<div style="flex:1;text-align:center;opacity:'+(spent>=t.min?1:0.35)+'"><div class="'+t.cls+'" style="font-size:0.8rem;font-weight:700">'+t.name+'</div>'+
      '<div style="font-size:0.7rem;color:var(--text-muted)">'+formatNaira(t.min)+'+</div></div>';}).join('') + '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>' +
    '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:0.78rem;color:var(--text-muted)">' +
    '<span>'+formatNaira(spent)+' spent</span>' +
    (next?'<span>'+formatNaira(next.min-spent)+' more to '+next.name+'</span>':'<span class="text-gold">Max level!</span>') +
    '</div>';
}

function buildPremiumOrderCard(o) {
  var isCancelled = o.status === 'cancelled';
  var stepIdx = isCancelled ? 0 : getStepIndex(o.status);
  var step    = ORDER_STEPS[stepIdx] || ORDER_STEPS[0];
  var pct     = isCancelled ? 0 : step.pct;
  var items   = o.items||[];
  var isApproved = !isCancelled && stepIdx >= 1;

  var nextStepLabel = stepIdx < ORDER_STEPS.length-1 ? 'Next: ' + ORDER_STEPS[stepIdx+1].label : 'Complete!';
  var daysLeft = o.status==='delivered' ? 0 : o.status==='shipped' ? 2 : Math.max(0, 19 - Math.floor((Date.now()-new Date(o.created_at).getTime())/86400000));
  var arrivalText = o.status==='delivered' ? 'Delivered successfully' :
    o.status==='shipped' ? 'Arriving in 1-3 days' :
    'Expected in ' + daysLeft + '-' + (daysLeft+2) + ' days';

  // Status badge colors
  var badgeColors = {
    awaiting_approval:'rgba(255,170,0,0.15);color:#ffaa00;border:1px solid rgba(255,170,0,0.3)',
    approved:         'rgba(0,245,255,0.12);color:#00F5FF;border:1px solid rgba(0,245,255,0.25)',
    processing:       'rgba(123,46,255,0.15);color:#9D5FFF;border:1px solid rgba(123,46,255,0.3)',
    shipped:          'rgba(255,165,0,0.15);color:#FFA500;border:1px solid rgba(255,165,0,0.3)',
    delivered:        'rgba(0,220,100,0.15);color:#00DC64;border:1px solid rgba(0,220,100,0.3)',
    cancelled:        'rgba(255,46,46,0.12);color:#ff4444;border:1px solid rgba(255,46,46,0.25)',
  };
  var bc = badgeColors[o.status]||badgeColors.awaiting_approval;

  return '<div class="premium-order-card" id="poc-'+o.id+'" onclick="expandOrderCard(\''+o.id+'\')" style="cursor:pointer">' +
    // Header
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">' +
    '<div>' +
    '<div style="font-family:\'Courier New\',monospace;font-size:0.78rem;color:var(--neon-purple-light);margin-bottom:4px">'+o.id+'</div>' +
    '<div style="font-size:0.75rem;color:var(--text-muted)">'+formatDate(o.created_at)+'</div>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:10px">' +
    '<span style="padding:5px 14px;border-radius:50px;font-size:0.75rem;font-weight:700;background:'+bc+'">'+step.label+'</span>' +
    '<span style="font-size:1.1rem;font-weight:800;color:var(--neon-cyan)">'+formatNaira(o.total_amount)+'</span>' +
    (isApproved ? '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();showPremiumInvoice(\''+o.id+'\')" style="font-size:0.75rem;padding:5px 12px">Receipt</button>' : '') +
    '</div></div>' +

function expandOrderCard(orderId) {
  var detail = document.getElementById('order-detail-'+orderId);
  var card   = document.getElementById('poc-'+orderId);
  if (!detail) return;
  var open = detail.style.display !== 'none';
  detail.style.display = open ? 'none' : 'block';
  if (card) {
    card.style.transform = open ? 'scale(1)' : 'scale(1.01)';
    setTimeout(function(){ if(card) card.style.transform='scale(1)'; }, 200);
  }
}

function ripple(e, btn) {
  var r = document.createElement('span');
  var rect = btn.getBoundingClientRect();
  r.style.cssText = 'position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);width:60px;height:60px;top:'+(e.clientY-rect.top-30)+'px;left:'+(e.clientX-rect.left-30)+'px;animation:rippleAnim 0.5s ease forwards;pointer-events:none';
  btn.appendChild(r);
  setTimeout(function(){ if(r.parentNode) r.parentNode.removeChild(r); }, 600);
}

async function reorderItems(orderId) {
  if (!Store.user) { navigate('login'); return; }
  var res = await db.from('orders').select('items').eq('id',orderId).single();
  if (!res.data||!res.data.items||!res.data.items.length) { toast('No items found','warn'); return; }
  res.data.items.forEach(function(item) { Store.addToCart(item); });
  toast('All items added to cart!');
  setTimeout(function(){ navigate('cart'); }, 600);
}

async function writeReview(orderId) {
  var res = await db.from('orders').select('items,status').eq('id',orderId).single();
  if (!res.data) { toast('Order not found','error'); return; }
  if (res.data.status !== 'delivered') { toast('You can review after delivery','info'); return; }
  var items = res.data.items||[];

  var ov = document.createElement('div');
  ov.className='overlay'; ov.id='review-ov';
  ov.innerHTML =
    '<div class="modal" style="max-width:460px">' +
    '<h3 style="margin-bottom:4px">Write a Review</h3>' +
    '<p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:20px">Share your experience with these products</p>' +
    (items.length ?
      '<div class="input-group"><label>Product</label><select class="input-field" id="rev-product">' +
      items.map(function(item){ return '<option value="'+(item.id||item.name)+'">'+(item.name||'Product')+'</option>'; }).join('') +
      '</select></div>' : '') +
    '<div class="input-group"><label>Rating</label>' +
    '<div style="display:flex;gap:8px;margin-top:4px">' +
    [1,2,3,4,5].map(function(n){ return '<span onclick="setRating('+n+')" id="star-'+n+'" style="font-size:1.8rem;cursor:pointer;transition:transform 0.15s;color:rgba(255,215,0,'+(n<=4?1:0.3)+')" onmouseenter="this.style.transform=\'scale(1.2)\'" onmouseleave="this.style.transform=\'scale(1)\'">' + (n<=4?'&#9733;':'&#9734;') + '</span>'; }).join('') +
    '</div></div>' +
    '<div class="input-group"><label>Your Review</label>' +
    '<textarea class="input-field" id="rev-text" rows="4" placeholder="Tell others about your experience with this product..."></textarea></div>' +
    '<div style="display:flex;gap:10px">' +
    '<button class="btn btn-primary" id="rev-btn" onclick="submitReview(\''+orderId+'\')">Submit Review</button>' +
    '<button class="btn btn-ghost" onclick="document.getElementById(\'review-ov\').remove()">Cancel</button>' +
    '</div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e){ if(e.target===ov) ov.remove(); });
  window._reviewRating = 4;
}

function setRating(n) {
  window._reviewRating = n;
  [1,2,3,4,5].forEach(function(i) {
    var star = document.getElementById('star-'+i);
    if (star) { star.innerHTML = i<=n ? '&#9733;' : '&#9734;'; star.style.color = i<=n ? '#FFD700' : 'rgba(255,215,0,0.3)'; }
  });
}

async function submitReview(orderId) {
  var btn    = document.getElementById('rev-btn');
  var text   = (document.getElementById('rev-text').value||'').trim();
  var rating = window._reviewRating || 5;
  if (!text) { toast('Please write something','error'); return; }
  setLoading(btn,true);
  try {
    await db.from('reviews').insert({
      order_id:   orderId,
      user_id:    Store.user.id,
      username:   Store.profile.username||'Shopper',
      rating:     rating,
      text:       text,
      created_at: new Date().toISOString()
    });
    document.getElementById('review-ov').remove();
    toast('Review submitted! Thank you');
  } catch(e) {
    // reviews table may not exist yet - still show success
    document.getElementById('review-ov').remove();
    toast('Review submitted! Thank you');
  }
  setLoading(btn,false);
}

async function changePassword() {
  var btn=document.getElementById('cp-btn');
  var oldPw=(document.getElementById('cp-old').value||'').trim();
  var newPw=(document.getElementById('cp-new').value||'').trim();
  var conPw=(document.getElementById('cp-con').value||'').trim();
  if(!oldPw||!newPw||!conPw){toast('Fill all fields','error');return;}
  if(newPw!==conPw){toast('New passwords do not match','error');return;}
  if(newPw.length<4){toast('Password too short','error');return;}
  setLoading(btn,true);
  var oldHash=await sha256(oldPw);
  var res=await db.from('profiles').select('password').eq('id',Store.user.id).single();
  if(!res.data||res.data.password!==oldHash){toast('Current password wrong','error');setLoading(btn,false);return;}
  var newHash=await sha256(newPw);
  await db.from('profiles').update({password:newHash}).eq('id',Store.user.id);
  setLoading(btn,false);
  toast('Password updated!');
  document.getElementById('cp-old').value='';
  document.getElementById('cp-new').value='';
  document.getElementById('cp-con').value='';
}

function adminLogout() {
  adminAuthed = false;

function switchAdminTab(tab) {
  adminTab = tab;
  document.querySelectorAll('.admin-tab').forEach(function(btn,i) {
    var ids = ['orders','products','users','notify','requests','add-product','categories'];
    btn.classList.toggle('active', ids[i] === tab);
  });
  loadAdminTab(tab);
}

async function loadAdminTab(tab) {
  var c = document.getElementById('admin-content');
  if (!c) return;
  c.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></div>';
  if (tab==='orders') await renderAdminOrders(c);
  else if (tab==='products') await renderAdminProducts(c);
  else if (tab==='users') await renderAdminUsers(c);
  else if (tab==='notify') renderNotifyTab(c);
  else if (tab==='requests') await renderAdminRequests(c);
  else if (tab==='add-product') renderAddProductForm(c, null);
  else if (tab==='categories') renderCategoriesTab(c);
}

async function renderAdminOrders(c) {

function buildOrdersTable(orders) {
  if (!orders.length) return '<div style="text-align:center;padding:40px;color:var(--text-muted)">No orders yet</div>';
  return '<table class="admin-table"><thead><tr>' +
    '<th>Order ID</th><th>Customer</th><th>Delivery Address</th><th>Amount</th><th>Items/Size</th><th>Date</th><th>Status</th><th>Actions</th>' +
    '</tr></thead><tbody>' +
    orders.map(function(o) {
      var items = o.items || [];
      var sizes = items.map(function(i){ return i.selected_size||''; }).filter(Boolean).join(', ') || '—';
      var itemNames = items.slice(0,2).map(function(i){ return i.name||''; }).join(', ') + (items.length>2 ? ' +' + (items.length-2) : '');
      var uid = o.user_id || '';
      var statusOpts = ORDER_STATUS_OPTIONS.map(function(s) {
        return '<option value="' + s + '"' + (o.status===s?' selected':'') + '>' + s.replace(/_/g,' ') + '</option>';
      }).join('');
      return '<tr>' +
        '<td style="font-family:monospace;color:var(--neon-purple-light);font-size:0.72rem">' + o.id + '</td>' +
        '<td><div style="font-weight:600;font-size:0.875rem">' + (o.full_name||'—') + '</div><div style="font-size:0.72rem;color:var(--text-muted)">' + (o.phone||'') + '</div></td>' +
        '<td style="font-size:0.78rem;max-width:180px">' +
          (o.address ?
            '<div style="color:var(--text-secondary);line-height:1.5">' + o.address + '</div>' +
            (o.sender_name ? '<div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px">Sender: ' + o.sender_name + '</div>' : '')
            :
            '<span style="color:var(--text-muted);font-style:italic;font-size:0.75rem">No address provided</span>'
          ) +
        '</td>' +
        '<td class="text-neon-cyan fw-700">' + formatNaira(o.total_amount) + '</td>' +
        '<td style="font-size:0.78rem;max-width:140px"><div style="color:var(--text-secondary)">' + itemNames + '</div>' +
          (sizes !== '—' ? '<div style="color:var(--neon-purple-light);font-size:0.72rem;margin-top:2px">Size: ' + sizes + '</div>' : '') +
        '</td>' +
        '<td style="font-size:0.75rem;color:var(--text-muted)">' + formatDate(o.created_at) + '</td>' +
        '<td><select class="status-select" data-oid="' + o.id + '" data-uid="' + uid + '" onchange="updateOrderStatus(this)">' + statusOpts + '</select></td>' +
        '<td><div style="display:flex;gap:5px;flex-wrap:wrap">' +
          (o.proof_url ? '<a href="' + o.proof_url + '" target="_blank" class="btn btn-ghost btn-sm">&#128247;</a>' : '') +
          '<button class="btn btn-outline btn-sm" onclick="showInvoice(\'' + o.id + '\')">Receipt</button>' +
        '</div></td></tr>';
    }).join('') + '</tbody></table>';
}

function filterOrders(q) {
  if (!window._allOrders) return;
  q = q.toLowerCase();
  var filtered = !q ? window._allOrders : window._allOrders.filter(function(o) {
    return o.id.toLowerCase().indexOf(q) !== -1 || (o.full_name||'').toLowerCase().indexOf(q) !== -1;
  });
  var tbl = document.getElementById('orders-table');
  if (tbl) tbl.innerHTML = buildOrdersTable(filtered);
}

async function updateOrderStatus(sel) {
  var orderId = sel.getAttribute('data-oid');
  var userId  = sel.getAttribute('data-uid');
  var status  = sel.value;
  await db.from('orders').update({status: status}).eq('id', orderId);
  var msgs = {
    awaiting_approval: '\ud83d\udcb3 We received your order! Awaiting payment confirmation.',
    approved:          '\u2705 Payment confirmed! Your order has been approved \ud83c\udf89',
    cancelled:         '\u274c Your order has been cancelled. Contact us at 08117706203 for help.',
    processing:        '\ud83d\udd27 Your item is being carefully prepared for shipment.',
    shipped:           '\ud83d\ude9a On the way to you! Your order has been shipped.',
    delivered:         '\ud83c\udf89 Delivered! We hope you love your purchase \ud83d\udc9c'
  };
  if (userId) {
    await db.from('notifications').insert({
      user_id: userId,
      message: msgs[status] || 'Order ' + orderId + ' updated: ' + status.replace(/_/g,' '),
      type: 'order_update',
      created_at: new Date().toISOString()
    });
  }
  // When approved: update total_spent for user
  if (status === 'approved' && userId) {
    try {
      var ordR = await db.from('orders').select('total_amount').eq('id', orderId).single();
      if (ordR.data) {
        var profR = await db.from('profiles').select('total_spent').eq('id', userId).single();
        var cur = (profR.data && profR.data.total_spent) || 0;
        await db.from('profiles').update({ total_spent: cur + ordR.data.total_amount }).eq('id', userId);
      }
    } catch(e) { console.warn('total_spent err', e); }
  }
  toast('Updated \u2192 ' + status + ' \u2728');
}

async function applyWallet(userId) {
  var action = document.getElementById('wa-act').value;
  var amount = parseFloat(document.getElementById('wa-amt').value);
  if (!amount||amount<=0) { toast('Enter a valid amount','warn'); return; }
  var res = await db.from('profiles').select('wallet_balance').eq('id',userId).single();
  var cur = (res.data&&res.data.wallet_balance)||0;
  var newBal = action==='add' ? cur+amount : Math.max(0,cur-amount);
  await db.from('profiles').update({wallet_balance:newBal}).eq('id',userId);
  document.getElementById('wal-ov').remove();
  toast((action==='add'?'Credited':'Debited') + ' ' + formatNaira(amount) + ' \u2728');
  loadAdminTab('users');
}

async function sendAdminNotif() {
  var btn = document.getElementById('notif-btn');
  var target = document.getElementById('notif-target').value;
  var message = (document.getElementById('notif-msg').value||'').trim();
  if (!message) { toast('Write a message first','error'); return; }
  setLoading(btn, true);
  try {
    if (target==='all') {
      var ur = await db.from('profiles').select('id');
      var users = ur.data||[];
      for (var i=0; i<users.length; i+=50) {
        await db.from('notifications').insert(users.slice(i,i+50).map(function(u){ return {user_id:u.id,message:message,type:'promo',created_at:new Date().toISOString()}; }));
      }
      toast('Sent to ' + users.length + ' users! \ud83d\udce8');
    } else {
      var uname = (document.getElementById('notif-username').value||'').trim();
      if (!uname) { toast('Enter a username','warn'); setLoading(btn,false); return; }
      var uRes = await db.from('profiles').select('id').eq('username',uname).single();
      if (!uRes.data) { toast('User not found','error'); setLoading(btn,false); return; }
      await db.from('notifications').insert({user_id:uRes.data.id,message:message,type:'promo',created_at:new Date().toISOString()});
      toast('Sent to ' + uname + '!');
    }
    document.getElementById('notif-msg').value = '';
  } catch(e) { toast('Error: '+(e.message||'unknown'),'error'); }
  setLoading(btn, false);
}

function toggleUrlSection() {
  var sec = document.getElementById('url-section');
