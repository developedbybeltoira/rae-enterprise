<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rae Enterprise ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Quicksand:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════
   RAE ENTERPRISE — Global Styles
   Theme: Glassmorphism Neon Purple × Cyan
═══════════════════════════════════════════════════════ */

:root {
  --neon-purple: #7B2EFF;
  --neon-purple-light: #9D5FFF;
  --neon-cyan: #00F5FF;
  --neon-pink: #FF2EBD;
  --neon-gold: #FFD700;
  --bg-dark: #0A0014;
  --bg-mid: #110024;
  --bg-card: rgba(123, 46, 255, 0.08);
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(123, 46, 255, 0.3);
  --glass-hover: rgba(123, 46, 255, 0.15);
  --text-primary: #F0E6FF;
  --text-secondary: rgba(240,230,255,0.65);
  --text-muted: rgba(240,230,255,0.35);
  --shadow-purple: 0 0 30px rgba(123, 46, 255, 0.4);
  --shadow-cyan: 0 0 20px rgba(0, 245, 255, 0.3);
  --shadow-pink: 0 0 20px rgba(255, 46, 189, 0.3);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-lg: 32px;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Quicksand', sans-serif;
  --font-script: 'Dancing Script', cursive;
  --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-dark: #f0e8ff;
  --bg-mid: #e8d5ff;
  --bg-card: rgba(123, 46, 255, 0.06);
  --glass: rgba(255,255,255,0.6);
  --glass-border: rgba(123, 46, 255, 0.25);
  --glass-hover: rgba(123, 46, 255, 0.12);
  --text-primary: #1a0040;
  --text-secondary: rgba(26,0,64,0.7);
  --text-muted: rgba(26,0,64,0.4);
  --shadow-purple: 0 8px 32px rgba(123, 46, 255, 0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── Particle Background ── */
#particles-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,46,255,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,245,255,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 60% 30%, rgba(255,46,189,0.1) 0%, transparent 50%),
    linear-gradient(160deg, #0A0014 0%, #0d001f 40%, #070020 70%, #000d1a 100%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}

[data-theme="light"] #particles-bg {
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,46,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,245,255,0.08) 0%, transparent 55%),
    linear-gradient(160deg, #f5eeff 0%, #ead5ff 50%, #dde8ff 100%);
}

@keyframes bgPulse {
  0% { opacity: 1; }
  100% { opacity: 0.85; }
}

/* Floating sparkles */
#particles-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle 1.5px at 15% 25%, rgba(0,245,255,0.6) 0%, transparent 100%),
    radial-gradient(circle 1px at 85% 15%, rgba(255,46,189,0.5) 0%, transparent 100%),
    radial-gradient(circle 2px at 45% 70%, rgba(123,46,255,0.7) 0%, transparent 100%),
    radial-gradient(circle 1px at 72% 55%, rgba(0,245,255,0.4) 0%, transparent 100%),
    radial-gradient(circle 1.5px at 30% 85%, rgba(255,46,189,0.5) 0%, transparent 100%),
    radial-gradient(circle 1px at 92% 40%, rgba(123,46,255,0.6) 0%, transparent 100%),
    radial-gradient(circle 2px at 60% 10%, rgba(0,245,255,0.5) 0%, transparent 100%);
  animation: sparkle 4s ease-in-out infinite alternate;
}

@keyframes sparkle {
  0% { transform: scale(1); opacity: 0.7; }
  100% { transform: scale(1.1); opacity: 1; }
}

#app { position: relative; z-index: 1; min-height: 100vh; }

/* ── Glass Card ── */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  transition: var(--transition);
}
.glass-card:hover {
  border-color: var(--neon-purple);
  box-shadow: var(--shadow-purple);
  transform: translateY(-2px);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border: none; border-radius: 50px;
  font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
  cursor: pointer; transition: var(--transition); text-decoration: none;
  position: relative; overflow: hidden; white-space: nowrap;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0.1); opacity: 0;
  transition: opacity 0.2s;
}
.btn:hover::after { opacity: 1; }

.btn-primary {
  background: linear-gradient(135deg, var(--neon-purple), #5B0FCC);
  color: #fff;
  box-shadow: 0 4px 20px rgba(123,46,255,0.5);
}
.btn-primary:hover { box-shadow: 0 6px 30px rgba(123,46,255,0.8); transform: translateY(-2px); }

.btn-cyan {
  background: linear-gradient(135deg, var(--neon-cyan), #00B8CC);
  color: #000;
  box-shadow: 0 4px 20px rgba(0,245,255,0.4);
}
.btn-cyan:hover { box-shadow: 0 6px 30px rgba(0,245,255,0.7); transform: translateY(-2px); }

.btn-outline {
  background: transparent;
  color: var(--neon-purple-light);
  border: 1.5px solid var(--neon-purple);
}
.btn-outline:hover {
  background: var(--glass-hover); box-shadow: var(--shadow-purple);
}

.btn-ghost {
  background: var(--glass); color: var(--text-primary);
  border: 1px solid var(--glass-border);
}
.btn-ghost:hover { background: var(--glass-hover); }

.btn-pink {
  background: linear-gradient(135deg, var(--neon-pink), #CC0090);
  color: #fff; box-shadow: var(--shadow-pink);
}
.btn-pink:hover { box-shadow: 0 6px 30px rgba(255,46,189,0.7); transform: translateY(-2px); }

.btn-sm { padding: 8px 18px; font-size: 0.8rem; }
.btn-lg { padding: 16px 40px; font-size: 1.05rem; }
.btn-full { width: 100%; justify-content: center; }

/* ── Inputs ── */
.input-group {
  display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
}
.input-group label {
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-secondary); letter-spacing: 0.04em; text-transform: uppercase;
}
.input-field {
  background: rgba(123,46,255,0.08);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  color: var(--text-primary);
  font-family: var(--font-body); font-size: 0.95rem;
  transition: var(--transition); outline: none; width: 100%;
}
.input-field::placeholder { color: var(--text-muted); }
.input-field:focus {
  border-color: var(--neon-purple);
  box-shadow: 0 0 0 3px rgba(123,46,255,0.2);
  background: rgba(123,46,255,0.12);
}
.input-field:focus + .input-icon { color: var(--neon-purple); }

.input-wrapper { position: relative; }
.input-wrapper .input-icon {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); transition: color 0.2s; cursor: pointer; font-size: 1.1rem;
}

/* ── Neon Text ── */
.text-neon-purple { color: var(--neon-purple); text-shadow: 0 0 20px rgba(123,46,255,0.6); }
.text-neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0,245,255,0.6); }
.text-neon-pink { color: var(--neon-pink); text-shadow: 0 0 20px rgba(255,46,189,0.6); }
.text-gold { color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); }
.text-gradient {
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.text-gradient-pink {
  background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 50px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
}
.badge-purple { background: rgba(123,46,255,0.2); color: var(--neon-purple-light); border: 1px solid rgba(123,46,255,0.3); }
.badge-cyan { background: rgba(0,245,255,0.15); color: var(--neon-cyan); border: 1px solid rgba(0,245,255,0.3); }
.badge-pink { background: rgba(255,46,189,0.15); color: var(--neon-pink); border: 1px solid rgba(255,46,189,0.3); }
.badge-gold { background: rgba(255,215,0,0.15); color: var(--neon-gold); border: 1px solid rgba(255,215,0,0.3); }
.badge-off {
  background: linear-gradient(135deg, var(--neon-pink), #cc0090);
  color: #fff; box-shadow: var(--shadow-pink);
  animation: pulseBadge 2s ease-in-out infinite;
}
@keyframes pulseBadge { 0%,100% { box-shadow: var(--shadow-pink); } 50% { box-shadow: 0 0 25px rgba(255,46,189,0.8); } }

/* ── Loading Spinner ── */
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--glass-border);
  border-top-color: var(--neon-purple); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.page-loader {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  background: var(--bg-dark);
  transition: opacity 0.4s ease;
}
.page-loader.fade-out { opacity: 0; pointer-events: none; }
.page-loader .logo-text {
  font-family: var(--font-script); font-size: 2.5rem; color: var(--text-primary);
  animation: shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100% { text-shadow: 0 0 20px var(--neon-purple); }
  50% { text-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-purple); }
}

/* ── Toast ── */
#toast-container {
  position: fixed; bottom: 90px; right: 20px; z-index: 9000;
  display: flex; flex-direction: column; gap: 10px; max-width: 320px;
}
.toast {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  animation: slideInToast 0.4s ease, fadeOutToast 0.4s ease 3.6s forwards;
  box-shadow: var(--shadow-purple);
}
.toast.success { border-color: var(--neon-cyan); }
.toast.error { border-color: var(--neon-pink); }
.toast.warn { border-color: var(--neon-gold); }
.toast-icon { font-size: 1.2rem; }
.toast-msg { font-size: 0.875rem; color: var(--text-primary); }
@keyframes slideInToast { from { transform: translateX(120%); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes fadeOutToast { to { transform: translateX(120%); opacity: 0; } }

/* ── Divider ── */
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }
.divider span { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }

/* ── Progress Bar ── */
.progress-bar {
  height: 6px; background: var(--glass); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
  box-shadow: 0 0 10px rgba(0,245,255,0.5);
  transition: width 0.5s ease;
}

/* ── Section Titles ── */
.section-title {
  font-family: var(--font-display); font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 700; margin-bottom: 8px;
}
.section-sub { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 28px; }

/* ── Grid Layouts ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}
@media (max-width: 600px) {
  .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}

/* ── Page Transitions ── */
.page-enter { animation: pageIn 0.4s ease; }
@keyframes pageIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(123,46,255,0.4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }

/* ── Utility ── */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-sm { font-size: 0.85rem; }
.text-xs { font-size: 0.75rem; }
.fw-700 { font-weight: 700; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

/* ── Price Display ── */
.price-original { text-decoration: line-through; color: var(--text-muted); font-size: 0.85rem; }
.price-discount {
  font-size: 1.2rem; font-weight: 700; color: var(--neon-cyan);
  text-shadow: 0 0 15px rgba(0,245,255,0.5);
}

/* ── Glow Border Animation ── */
.glow-border {
  position: relative;
  border: 1px solid transparent;
  background-clip: padding-box;
}
.glow-border::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit; z-index: -1; padding: 1px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan), var(--neon-pink));
  background-size: 300% 300%;
  animation: gradientBorder 3s linear infinite;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}
@keyframes gradientBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── Stars ── */
.stars { color: var(--neon-gold); font-size: 0.85rem; letter-spacing: 2px; }

/* ── Overlay ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-mid); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 32px; max-width: 520px; width: 90%;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(60px) scale(0.95); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── Level Badge ── */
.level-bronze { color: #cd7f32; }
.level-silver { color: #c0c0c0; }
.level-gold { color: var(--neon-gold); }

/* ── Countdown ── */
.countdown { display: flex; gap: 10px; }
.countdown-unit {
  display: flex; flex-direction: column; align-items: center;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 8px 12px; min-width: 50px;
}
.countdown-num { font-size: 1.5rem; font-weight: 700; color: var(--neon-cyan); line-height: 1; }
.countdown-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

/* ── NAVBAR ── */
#navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  background: rgba(10, 0, 20, 0.7);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 20px; height: 64px;
  display: flex; align-items: center; gap: 16px;
  transition: var(--transition);
}

[data-theme="light"] #navbar {
  background: rgba(240, 232, 255, 0.8);
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; flex-shrink: 0; cursor: pointer;
}
.nav-logo-text {
  font-family: var(--font-script); font-size: 1.5rem;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nav-logo img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }

.nav-search {
  flex: 1; max-width: 500px; position: relative;
}
.nav-search input {
  width: 100%; padding: 10px 16px 10px 42px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50px; color: var(--text-primary);
  font-family: var(--font-body); font-size: 0.875rem; outline: none;
  transition: var(--transition);
}
.nav-search input:focus {
  border-color: var(--neon-purple); box-shadow: 0 0 0 2px rgba(123,46,255,0.2);
  background: var(--glass-hover);
}
.nav-search input::placeholder { color: var(--text-muted); }
.nav-search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 0.9rem; color: var(--text-muted); pointer-events: none;
}
.search-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: var(--bg-mid); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 8px;
  box-shadow: var(--shadow-purple); max-height: 300px; overflow-y: auto;
  z-index: 200;
}
.search-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.2s;
}
.search-item:hover { background: var(--glass-hover); }
.search-item-img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
.search-item-name { font-size: 0.875rem; font-weight: 600; }
.search-item-price { font-size: 0.8rem; color: var(--neon-cyan); }

.nav-actions {
  display: flex; align-items: center; gap: 8px; margin-left: auto;
}

.nav-icon-btn {
  position: relative; background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; color: var(--text-primary);
  transition: var(--transition); text-decoration: none;
}
.nav-icon-btn:hover { background: var(--glass-hover); border-color: var(--neon-purple); box-shadow: var(--shadow-purple); }

#cart-badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--neon-pink); color: #fff;
  font-size: 0.65rem; font-weight: 700;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-pink);
}

.theme-toggle {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50px; width: 52px; height: 28px;
  cursor: pointer; position: relative; transition: var(--transition);
}
.theme-toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
  transition: transform 0.3s ease;
  box-shadow: 0 0 8px rgba(123,46,255,0.5);
}
[data-theme="light"] .theme-toggle::after { transform: translateX(24px); }

.nav-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 700; color: #fff;
  cursor: pointer; border: 2px solid transparent;
  transition: var(--transition);
}
.nav-avatar:hover { border-color: var(--neon-cyan); box-shadow: var(--shadow-cyan); }

.nav-dropdown {
  position: absolute; top: calc(100% + 10px); right: 0;
  background: var(--bg-mid); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 8px; min-width: 180px;
  box-shadow: var(--shadow-purple); animation: slideUp 0.2s ease;
}
.nav-dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 0.875rem; color: var(--text-primary);
  transition: background 0.2s; text-decoration: none;
}
.nav-dropdown-item:hover { background: var(--glass-hover); }
.nav-dropdown-item.danger { color: var(--neon-pink); }

.nav-avatar-wrap { position: relative; }

/* Mobile */
.nav-mobile-menu { display: none; }
@media (max-width: 768px) {
  .nav-search { display: none; }
  .nav-mobile-menu { display: flex; }
}

/* ── BOTTOM MOBILE NAV ── */
#bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 890;
  background: rgba(10,0,20,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(123,46,255,0.3);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  flex-direction: row; justify-content: space-around; align-items: center;
}
@media (max-width: 768px) {
  #bottom-nav { display: flex; }
  .home-page, .dashboard-page, .auth-page, .product-page { padding-bottom: 80px !important; }
  #app { padding-bottom: 0; }
}
.bn-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 6px 12px; border-radius: 12px;
  transition: all 0.2s; flex: 1; min-width: 0;
}
.bn-item:active { background: rgba(123,46,255,0.2); transform: scale(0.93); }
.bn-item.active { background: rgba(123,46,255,0.15); }
.bn-icon { font-size: 1.3rem; line-height: 1; }
.bn-label { font-size: 0.62rem; font-weight: 600; color: rgba(240,230,255,0.6); letter-spacing: 0.03em; }
.bn-cart .bn-icon { font-size: 1.5rem; }
.bn-cart { background: rgba(123,46,255,0.1); border-radius: 16px; }

[data-theme="light"] #bottom-nav {
  background: rgba(240,232,255,0.95);
  border-top-color: rgba(123,46,255,0.2);
}
[data-theme="light"] .bn-label { color: rgba(26,0,64,0.6); }

/* ── AUTH PAGES ── */
.auth-page {
  min-height: 100vh; display: flex;
  padding-top: 64px;
}

.auth-left {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 40px;
  display: none;
}

@media (min-width: 900px) {
  .auth-left { display: flex; }
}

.auth-illustration {
  max-width: 420px; text-align: center;
}
.auth-mascot {
  width: 260px; height: 260px; margin: 0 auto 28px;
  border-radius: 50%; overflow: hidden;
  border: 3px solid transparent;
  background: linear-gradient(var(--bg-mid), var(--bg-mid)) padding-box,
    linear-gradient(135deg, var(--neon-purple), var(--neon-cyan), var(--neon-pink)) border-box;
  box-shadow:
    0 0 40px rgba(123,46,255,0.4),
    0 0 80px rgba(0,245,255,0.2),
    inset 0 0 30px rgba(123,46,255,0.15);
  animation: floatMascot 4s ease-in-out infinite;
  display: flex; align-items: center; justify-content: center;
}
.auth-mascot img {
  width: 100%; height: 100%; object-fit: cover;
  filter: hue-rotate(0deg) saturate(1.2) brightness(1.1);
}

/* Recolor the wolf mascot to match site theme */
.auth-mascot-placeholder {
  font-size: 8rem; line-height: 1;
}

@keyframes floatMascot {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-16px) rotate(1deg); }
}

.auth-illustration h2 {
  font-family: var(--font-display); font-size: 2rem; font-weight: 700;
  margin-bottom: 14px;
}
.auth-illustration p {
  color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7;
}

.auth-features { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; text-align: left; }
.auth-feature {
  display: flex; align-items: center; gap: 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); padding: 12px 16px;
  font-size: 0.875rem;
}
.auth-feature-icon { font-size: 1.3rem; flex-shrink: 0; }

.auth-right {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 24px;
  max-width: 520px;
}

@media (max-width: 899px) { .auth-right { max-width: 100%; } }

.auth-card {
  width: 100%; max-width: 460px;
  background: var(--glass); backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 40px 36px;
  animation: pageIn 0.5s ease;
}

@media (max-width: 480px) { .auth-card { padding: 28px 20px; } }

.auth-header { text-align: center; margin-bottom: 32px; }
.auth-header h1 {
  font-family: var(--font-display); font-size: 2rem; font-weight: 900;
  margin-bottom: 6px;
}
.auth-header p { font-size: 0.875rem; color: var(--text-secondary); }

.auth-tabs {
  display: flex; gap: 0; background: var(--glass);
  border: 1px solid var(--glass-border); border-radius: 50px;
  padding: 4px; margin-bottom: 28px;
}
.auth-tab {
  flex: 1; text-align: center; padding: 10px 16px;
  border-radius: 50px; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; transition: var(--transition); color: var(--text-muted);
  border: none; background: transparent; font-family: var(--font-body);
}
.auth-tab.active {
  background: linear-gradient(135deg, var(--neon-purple), #5B0FCC);
  color: #fff; box-shadow: 0 4px 16px rgba(123,46,255,0.4);
}

.social-divider { margin: 20px 0; }

.remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.remember-row label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; color: var(--text-secondary); }
.remember-row a { font-size: 0.85rem; color: var(--neon-purple-light); text-decoration: none; }
.remember-row a:hover { text-decoration: underline; }

/* Custom checkbox */
input[type="checkbox"] {
  appearance: none; width: 16px; height: 16px;
  border: 1.5px solid var(--glass-border); border-radius: 4px;
  background: var(--glass); cursor: pointer; position: relative;
  transition: var(--transition); flex-shrink: 0;
}
input[type="checkbox"]:checked {
  background: var(--neon-purple); border-color: var(--neon-purple);
}
input[type="checkbox"]:checked::after {
  content: '✓'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.7rem; font-weight: 700;
}

.auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
.auth-footer a { color: var(--neon-purple-light); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

/* Password strength */
.password-strength { margin-top: 6px; }
.strength-bar { height: 4px; border-radius: 2px; background: var(--glass); overflow: hidden; margin-bottom: 4px; }
.strength-fill { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.4s; }
.strength-label { font-size: 0.75rem; color: var(--text-muted); }

/* Referral badge on signup */
.referral-notice {
  display: flex; align-items: center; gap: 10px;
  background: rgba(0,245,255,0.08); border: 1px solid rgba(0,245,255,0.3);
  border-radius: var(--radius-sm); padding: 12px 16px;
  margin-bottom: 20px; font-size: 0.85rem; color: var(--neon-cyan);
}

/* Welcome typing headline */
.auth-welcome-headline {
  font-family: var(--font-script); font-size: 1.8rem;
  margin-bottom: 8px; min-height: 44px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── HOME PAGE ── */
.home-page { padding-top: 64px; }

/* Hero */
.hero {
  min-height: 85vh; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 60px 24px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(123,46,255,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 30% 70%, rgba(0,245,255,0.1) 0%, transparent 60%);
  animation: heroGlow 6s ease-in-out infinite alternate;
}
@keyframes heroGlow {
  0% { opacity: 0.7; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.05); }
}

.hero-content { position: relative; max-width: 780px; }

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(123,46,255,0.15); border: 1px solid rgba(123,46,255,0.3);
  border-radius: 50px; padding: 6px 18px; font-size: 0.8rem; font-weight: 600;
  color: var(--neon-purple-light); letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 24px; animation: fadeIn 0.6s ease;
}

.hero-title {
  font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 5.5rem);
  font-weight: 900; line-height: 1.05; margin-bottom: 20px;
  animation: pageIn 0.7s ease 0.1s both;
}
.hero-title .italic-accent { font-style: italic; }

.hero-subtitle {
  font-size: clamp(1rem, 2vw, 1.15rem); color: var(--text-secondary);
  max-width: 520px; margin: 0 auto 36px; line-height: 1.7;
  animation: pageIn 0.7s ease 0.2s both;
}

.hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  animation: pageIn 0.7s ease 0.3s both;
}

.hero-stats {
  display: flex; gap: 40px; justify-content: center;
  margin-top: 48px; animation: pageIn 0.7s ease 0.4s both;
}
.hero-stat { text-align: center; }
.hero-stat-num {
  font-family: var(--font-display); font-size: 2rem; font-weight: 700;
  color: var(--text-primary);
}
.hero-stat-label { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.05em; }

/* Flash Sale Banner */
.flash-banner {
  background: linear-gradient(135deg, rgba(255,46,189,0.15), rgba(123,46,255,0.15));
  border-top: 1px solid rgba(255,46,189,0.2);
  border-bottom: 1px solid rgba(255,46,189,0.2);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}
.flash-banner-label {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 1rem;
}
.flash-fire { font-size: 1.4rem; animation: bounce 0.5s ease infinite alternate; }
@keyframes bounce { to { transform: translateY(-4px); } }

/* Category Pills */
.category-section { padding: 48px 24px; }
.category-pills {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.category-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50px; padding: 10px 20px;
  cursor: pointer; font-size: 0.875rem; font-weight: 600;
  transition: var(--transition); color: var(--text-primary);
}
.category-pill:hover, .category-pill.active {
  background: var(--glass-hover); border-color: var(--neon-purple);
  color: var(--neon-purple-light); box-shadow: var(--shadow-purple);
  transform: translateY(-2px);
}

/* Products Section */
.products-section { padding: 20px 24px 48px; }

/* Product Card */
.product-card {
  background: var(--glass); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  overflow: hidden; cursor: pointer; transition: var(--transition);
  position: relative;
}
.product-card:hover {
  border-color: var(--neon-purple); box-shadow: var(--shadow-purple);
  transform: translateY(-6px);
}
.product-card:hover .product-img-overlay { opacity: 1; }
.product-card:hover .product-img { transform: scale(1.08); }

.product-img-wrap {
  position: relative; aspect-ratio: 1; overflow: hidden;
  background: rgba(123,46,255,0.08);
}
.product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
.product-img-overlay {
  position: absolute; inset: 0; background: rgba(123,46,255,0.2);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  opacity: 0; transition: var(--transition);
}
.product-badges {
  position: absolute; top: 10px; left: 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.product-wishlist {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.9rem; transition: var(--transition);
}
.product-wishlist:hover { background: rgba(255,46,189,0.2); border-color: var(--neon-pink); }
.product-wishlist.active { color: var(--neon-pink); }

.product-info { padding: 14px; }
.product-name {
  font-weight: 700; font-size: 0.875rem; margin-bottom: 4px;
  color: var(--text-primary); line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.product-price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.product-stock { font-size: 0.72rem; color: var(--neon-pink); font-weight: 600; }
.product-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
.product-rating-count { font-size: 0.75rem; color: var(--text-muted); }
.product-add-btn {
  width: 100%; padding: 10px;
  background: linear-gradient(135deg, rgba(123,46,255,0.15), rgba(0,245,255,0.1));
  border: 1px solid rgba(123,46,255,0.3);
  border-radius: var(--radius-sm); color: var(--neon-purple-light);
  font-family: var(--font-body); font-size: 0.8rem; font-weight: 700;
  cursor: pointer; transition: var(--transition);
}
.product-add-btn:hover {
  background: var(--neon-purple); color: #fff; box-shadow: var(--shadow-purple);
}

/* Marquee scroll */
.marquee-wrap { overflow: hidden; padding: 20px 0; }
.marquee { display: flex; gap: 16px; animation: marquee 20s linear infinite; white-space: nowrap; }
.marquee:hover { animation-play-state: paused; }
@keyframes marquee { to { transform: translateX(-50%); } }
.marquee-item {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50px; padding: 8px 20px; font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary); flex-shrink: 0;
}

/* Referral Banner */
.referral-cta {
  margin: 40px 24px; padding: 40px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(123,46,255,0.15), rgba(0,245,255,0.1));
  border: 1px solid rgba(123,46,255,0.25);
  text-align: center; position: relative; overflow: hidden;
}
.referral-cta::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,245,255,0.1) 0%, transparent 70%);
}
.referral-cta h2 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 12px; }
.referral-cta p { color: var(--text-secondary); max-width: 500px; margin: 0 auto 24px; }

/* ── PRODUCT PAGE ── */
.product-page { padding-top: 80px; padding-bottom: 60px; }

.product-breadcrumb {
  font-size: 0.8rem; color: var(--text-muted); margin-bottom: 28px;
  display: flex; align-items: center; gap: 6px;
}
.product-breadcrumb span { cursor: pointer; }
.product-breadcrumb span:hover { color: var(--neon-purple-light); }

.product-detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start;
}
@media (max-width: 768px) {
  .product-detail-grid { grid-template-columns: 1fr; gap: 28px; }
}

/* Gallery */
.product-gallery { position: relative; }
.product-main-img-wrap {
  border-radius: var(--radius); overflow: hidden; aspect-ratio: 1;
  background: var(--glass); cursor: zoom-in; position: relative;
  border: 1px solid var(--glass-border);
}
.product-main-img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.product-main-img-wrap:hover .product-main-img { transform: scale(1.1); }

.product-thumbnails { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.product-thumb {
  width: 72px; height: 72px; border-radius: var(--radius-sm);
  object-fit: cover; cursor: pointer; border: 2px solid var(--glass-border);
  transition: var(--transition);
}
.product-thumb:hover, .product-thumb.active { border-color: var(--neon-purple); box-shadow: var(--shadow-purple); }

/* Product Info */
.product-detail-info {}
.product-detail-name {
  font-family: var(--font-display); font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 800; margin-bottom: 12px; line-height: 1.2;
}

.product-detail-price-row {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
}
.price-big { font-size: 2rem; font-weight: 800; color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0,245,255,0.5); }

.product-detail-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.product-detail-rating .stars { font-size: 1rem; }

/* Qty Selector */
.qty-selector { display: flex; align-items: center; gap: 0; margin-bottom: 20px; }
.qty-btn {
  width: 40px; height: 40px; background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-primary); font-size: 1.2rem; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-body);
}
.qty-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
.qty-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.qty-btn:hover { background: var(--glass-hover); }
.qty-display {
  min-width: 50px; height: 40px; background: var(--glass); border-top: 1px solid var(--glass-border);
  border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}

.product-actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }

/* Tags */
.product-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.product-tag {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 50px; padding: 4px 14px; font-size: 0.78rem; color: var(--text-secondary);
}

/* Reviews */
.reviews-section { margin-top: 48px; }
.review-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
}
.review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.review-author { font-weight: 700; font-size: 0.875rem; }
.review-date { font-size: 0.75rem; color: var(--text-muted); }
.review-text { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6; }

/* Related */
.related-section { margin-top: 48px; padding-top: 40px; border-top: 1px solid var(--glass-border); }

/* ── CART PAGE ── */
.cart-page { padding-top: 80px; padding-bottom: 60px; }

.cart-grid {
  display: grid; grid-template-columns: 1fr 360px; gap: 28px; align-items: start;
}
@media (max-width: 900px) { .cart-grid { grid-template-columns: 1fr; } }

.cart-items-list { display: flex; flex-direction: column; gap: 14px; }

.cart-item {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 18px; display: flex; gap: 14px;
  align-items: center; transition: var(--transition);
}
.cart-item:hover { border-color: var(--neon-purple); }
.cart-item-img {
  width: 80px; height: 80px; border-radius: var(--radius-sm);
  object-fit: cover; flex-shrink: 0;
}
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-weight: 700; margin-bottom: 4px; font-size: 0.9rem; }
.cart-item-price { color: var(--neon-cyan); font-weight: 700; font-size: 0.9rem; margin-bottom: 10px; }
.cart-item-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.cart-remove { color: var(--neon-pink); font-size: 0.8rem; cursor: pointer; background: none; border: none; font-family: var(--font-body); }
.cart-remove:hover { text-decoration: underline; }

/* Order Summary Card */
.order-summary {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 28px; position: sticky; top: 80px;
}
.order-summary h3 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 20px; }
.summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; }
.summary-total { border-top: 1px solid var(--glass-border); padding-top: 14px; margin-top: 4px; }
.summary-total .summary-row { font-size: 1.1rem; font-weight: 700; }

/* Checkout Modal */
.payment-details {
  background: rgba(0,245,255,0.06); border: 1px solid rgba(0,245,255,0.2);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.payment-details h4 { color: var(--neon-cyan); margin-bottom: 10px; }
.payment-detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.875rem; }

.order-status-steps {
  display: flex; justify-content: space-between; position: relative;
  margin: 28px 0;
}
.order-status-steps::before {
  content: ''; position: absolute; top: 14px; left: 0; right: 0; height: 2px;
  background: var(--glass-border); z-index: 0;
}
.order-step {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  position: relative; z-index: 1; flex: 1;
}
.order-step-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--glass); border: 2px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
}

function debounce(fn, delay) {

function timeAgo(dateStr) {

  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;

}

// Typing placeholder animation
function animatePlaceholder(input, phrases, speed = 80) {
  let pi = 0, ci = 0, deleting = false;
  function type() {
    const phrase = phrases[pi];
    if (!deleting) {
      input.setAttribute('placeholder', phrase.slice(0, ++ci));
      if (ci === phrase.length) { deleting = true; setTimeout(type, 1400); return; }
    } else {
      input.setAttribute('placeholder', phrase.slice(0, --ci));
      if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; }
    }
    setTimeout(type, deleting ? 40 : speed);
  }
  type();
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

    try {
      var uid = sessionStorage.getItem('rae_uid');

      var res = await db.from('profiles').select('*').eq('id', uid).single();

      this.user = res.data; this.profile = res.data;
      await this.loadCart();

    sessionStorage.removeItem('rae_uid');
    this.user=null; this.profile=null; this.cart=[]; this.cartCount=0;
    this.updateCartBadge();
  },

  async loadCart() {
    if (!this.user) { this.cart=[]; return; }
    try { var s=localStorage.getItem('rc_'+this.user.id); this.cart=s?JSON.parse(s):[]; } catch(e){this.cart=[];}
    this.cartCount=this.cart.reduce(function(a,i){return a+i.qty;},0);

    if (!this.user) return;

    this.cartCount=this.cart.reduce(function(a,i){return a+i.qty;},0);

  addToCart(p) {
    var f=null; for(var i=0;i<this.cart.length;i++){if(this.cart[i].id===p.id){f=this.cart[i];break;}}
    if(f){f.qty+=1;}else{var o={}; for(var k in p)o[k]=p[k]; o.qty=1; this.cart.push(o);}
    this.saveCart(); toast((p.name||'Item')+' added! 🛒');
  },

  removeFromCart(id){this.cart=this.cart.filter(function(i){return i.id!==id;});this.saveCart();},

  updateQty(id,qty){
    if(qty<=0){this.removeFromCart(id);return;}
    for(var i=0;i<this.cart.length;i++){if(this.cart[i].id===id){this.cart[i].qty=qty;break;}}
    this.saveCart();

};

// RAE ENTERPRISE — Auth
// Username + password against profiles table
// Password protected with SHA-256 (Web Crypto — works in all browsers)

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){ return ('00'+b.toString(16)).slice(-2); }).join('');
}

// ── REGISTER ─────────────────────────────────────────
async function doRegister(e) {
  e.preventDefault();
  var btn      = document.getElementById('r-btn');
  var username = (document.getElementById('r-user').value  || '').trim();
  var email    = (document.getElementById('r-email').value || '').trim().toLowerCase();
  var phone    = (document.getElementById('r-phone').value || '').trim();
  var password = (document.getElementById('r-pw').value    || '').trim();
  var refBy    = (document.getElementById('r-ref').value   || '').trim();

  if (!username || !email || !phone || !password) {
    toast('Please fill all fields 💔', 'error'); return;
  }

  setLoading(btn, true);

  try {
    // Check username not taken
    var uChk = await db.from('profiles').select('id').eq('username', username);
    if (uChk.data && uChk.data.length > 0) {
      toast('Username taken — try another 💔', 'error');
      setLoading(btn, false); return;
    }

    // Check email not taken
    var eChk = await db.from('profiles').select('id').eq('email', email);
    if (eChk.data && eChk.data.length > 0) {
      toast('Email already registered — please sign in 💜', 'warn');
      setLoading(btn, false); renderAuth('login'); return;
    }

    // Hash password with SHA-256
    var hashed = await sha256(password);

    // Insert user
    var ins = await db.from('profiles').insert({
      username:       username,
      email:          email,
      phone:          phone,
      password:       hashed,
      referred_by:    refBy || null,
      role:           'user',
      wallet_balance: 0,
      total_spent:    0,
      referral_count: 0,
      created_at:     new Date().toISOString()
    }).select().single();

    if (ins.error || !ins.data) {
      var errMsg = ins.error ? ins.error.message : 'Insert failed';
      // If still RLS error, show clear instructions
      if (errMsg.toLowerCase().indexOf('security') !== -1 || errMsg.toLowerCase().indexOf('policy') !== -1) {
        toast('Database not set up yet! Please run supabase_setup.sql first.', 'error');
      } else {
        toast('Registration failed: ' + errMsg, 'error');
      }
      setLoading(btn, false); return;
    }

    // Credit referrer
    if (refBy) {
      try {
        var rr = await db.from('profiles').select('id,referral_count').eq('username', refBy).single();
        if (rr.data) await db.from('profiles').update({ referral_count: (rr.data.referral_count||0)+1 }).eq('id', rr.data.id);
      } catch(re) {}
    }

    // Log in
    Store.user = ins.data; Store.profile = ins.data;
    sessionStorage.setItem('rae_uid', ins.data.id);
    await Store.loadCart();
    renderNavbar();
    setLoading(btn, false);
    toast('Welcome to the family! 💜\u2728');
    navigate('home');

  } catch(err) {
    setLoading(btn, false);
    toast('Error: ' + (err.message || 'unknown'), 'error');
    console.error(err);
  }
}

// ── LOGIN ─────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  var btn      = document.getElementById('l-btn');
  var username = (document.getElementById('l-user').value || '').trim();
  var password = (document.getElementById('l-pw').value   || '').trim();

  if (!username || !password) {
    toast('Enter username and password 💔', 'error'); return;
  }

  setLoading(btn, true);

  try {
    // Hash the entered password
    var hashed = await sha256(password);

    // Check username exists first
    var uRes = await db.from('profiles').select('id,password').eq('username', username).single();

    if (uRes.error || !uRes.data) {
      toast('Username not found 💔 Please register first.', 'error');
      setLoading(btn, false); return;
    }

    // Compare hashed passwords
    if (uRes.data.password !== hashed) {
      toast('Wrong password 💔 Please try again.', 'error');
      setLoading(btn, false); return;
    }

    // Fetch full profile
    var full = await db.from('profiles').select('*').eq('username', username).single();
    Store.user = full.data; Store.profile = full.data;
    sessionStorage.setItem('rae_uid', full.data.id);
    await Store.loadCart();
    renderNavbar();
    setLoading(btn, false);
    toast('Welcome back, gorgeous! 💜');
    navigate('home');

  } catch(err) {
    setLoading(btn, false);
    toast('Error: ' + (err.message || 'unknown'), 'error');
    console.error(err);
  }
}

function togglePw(id, icon) {
  var el = document.getElementById(id); if (!el) return;

});

async function loadProducts(reset) {
  if (reset) productsOffset = 0;
  var grid = document.getElementById('products-grid');
  if (!grid) return;
  if (reset) grid.innerHTML = productsSkeleton(8);

  var sort = (document.getElementById('sort-select') || {}).value || 'newest';
  var query = db.from('products').select('*').eq('in_stock', true);
  if (homeCategory !== 'All') query = query.eq('category', homeCategory);
  if (sort === 'price-asc')  query = query.order('discount_price', {ascending:true});
  else if (sort === 'price-desc') query = query.order('discount_price', {ascending:false});
  else query = query.order('created_at', {ascending:false});
  query = query.range(productsOffset, productsOffset + 11);

  var res = await query;
  var data = res.data || [];

  if (reset) grid.innerHTML = '';
  if (!data.length && reset) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px"><div style="font-size:3rem;margin-bottom:12px">🛍️</div><p style="color:var(--text-muted)">No products found yet. Check back soon!</p></div>';
    return;
  }

  data.forEach(function(p) { grid.insertAdjacentHTML('beforeend', productCardHTML(p)); });
  productsOffset += 12;
}

function productCardHTML(p) {
  var discount = getDiscount(p.price, p.discount_price);
  var img = (p.images && p.images[0]) || 'https://placehold.co/400x400/7B2EFF/fff?text=✨';
  var stars = '★★★★' + (Math.random()>0.5?'★':'☆');
  var reviews = Math.floor(20 + Math.random()*200);
  var stock = p.stock_count || 0;

  return '<div class="product-card" onclick="navigate(\'product\',{id:\''+p.id+'\'})">' +
    '<div class="product-img-wrap">' +
    '<img class="product-img" src="'+img+'" alt="'+p.name+'" loading="lazy" onerror="this.src=\'https://placehold.co/400x400/7B2EFF/fff?text=✨\'" />' +
    '<div class="product-badges">' +
    (discount>0?'<span class="badge badge-off">-'+discount+'% OFF</span>':'') +
    (stock>0&&stock<=10?'<span class="badge badge-pink">🔥 Only '+stock+' left!</span>':'') +
    (p.is_flash?'<span class="badge badge-gold">⚡ Flash</span>':'') +
    '</div>' +
    '<button class="product-wishlist" onclick="event.stopPropagation();this.textContent=this.textContent===\'🤍\'?\'❤️\':\'🤍\'">🤍</button>' +
    '<div class="product-img-overlay">' +
    '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();quickAdd(\''+p.id+'\')">+ Cart</button>' +
    '</div></div>' +
    '<div class="product-info">' +
    '<div class="product-name">'+p.name+'</div>' +
    '<div class="product-price-row">' +
    (discount>0?'<span class="price-original">'+formatNaira(p.price)+'</span>':'') +
    '<span class="price-discount">'+formatNaira(p.discount_price||p.price)+'</span>' +
    '</div>' +
    '<div class="product-rating"><span class="stars">'+stars+'</span><span class="product-rating-count">('+reviews+')</span></div>' +
    '<button class="product-add-btn" onclick="event.stopPropagation();quickAdd(\''+p.id+'\')">🛒 Add to Cart</button>' +
    '</div></div>';

function productsSkeleton(n) {
  var s = '';
  for (var i=0;i<n;i++) {
    s += '<div class="product-card" style="pointer-events:none">' +
    '<div class="product-img-wrap" style="background:var(--glass)"></div>' +
    '<div class="product-info">' +
    '<div style="height:14px;background:var(--glass);border-radius:4px;margin-bottom:8px"></div>' +
    '<div style="height:18px;background:var(--glass);border-radius:4px;width:60%"></div>' +
    '</div></div>';
  }
  return s;
}

async function quickAdd(productId) {
  if (!Store.user) { toast('Please sign in to add to cart 💜','warn'); navigate('login'); return; }
  var res = await db.from('products').select('*').eq('id', productId).single();
  if (res.data) Store.addToCart(res.data);
}

function filterCategory(cat) {
  homeCategory = cat;
  document.querySelectorAll('.category-pill').forEach(function(p) {
    p.classList.toggle('active', p.textContent.trim().indexOf(cat) !== -1);
  });
  // Update section title
  var t = document.querySelector('.products-section .section-title');
  if (t) t.innerHTML = cat==='All' ? '✨ Featured Products' : cat+' Collection';
  loadProducts(true);
}

function startCountdown() {
  function update() {
    var el = document.getElementById('flash-countdown');
    if (!el) return;
    var diff = flashEndTime - Date.now();
    if (diff <= 0) { el.innerHTML = '<span style="color:var(--text-muted)">Sale Ended</span>'; return; }
    var h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    el.innerHTML =
      '<div class="countdown-unit"><span class="countdown-num">'+String(h).padStart(2,'0')+'</span><span class="countdown-label">Hrs</span></div>' +
      '<div class="countdown-unit"><span class="countdown-num">'+String(m).padStart(2,'0')+'</span><span class="countdown-label">Min</span></div>' +
      '<div class="countdown-unit"><span class="countdown-num">'+String(s).padStart(2,'0')+'</span><span class="countdown-label">Sec</span></div>';
  }
  update(); setInterval(update, 1000);
}

function renderMarquee() {

  if (!data?.length) { grid.innerHTML = '<div style="color:var(--text-muted)">No related products</div>'; return; }

}

async function submitOrder(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-order-btn');
  setLoading(btn, true);

  const proofFile = document.getElementById('order-proof').files[0];
  let proofUrl = null;

  if (proofFile) {
    const fileName = `proofs/${Store.user.id}/${Date.now()}_${proofFile.name}`;
    const { data: uploadData } = await db.storage.from('order-proofs').upload(fileName, proofFile);
    if (uploadData) {
      const { data: urlData } = db.storage.from('order-proofs').getPublicUrl(fileName);
      proofUrl = urlData?.publicUrl;
    }
  }

  const orderId = generateOrderId();
  const total = Store.getCartTotal();

  const { error } = await db.from('orders').insert({
    id: orderId,
    user_id: Store.user.id,
    items: Store.cart,
    total_amount: total,
    full_name: document.getElementById('order-name').value,
    address: document.getElementById('order-address').value,
    phone: document.getElementById('order-phone').value,
    sender_name: document.getElementById('order-sender').value,
    proof_url: proofUrl,
    status: 'awaiting_approval',
    created_at: new Date().toISOString(),
  });

  setLoading(btn, false);

  if (error) { toast('Error submitting order. Please try again 💔', 'error'); return; }

  // Check referral rewards
  await checkReferralRewards(total);

  Store.clearCart();
  document.getElementById('checkout-overlay')?.remove();
  toast(`Order ${orderId} submitted! 🎉 Awaiting approval.`, 'success');
  navigate('orders');
}

async function checkoutWithWallet() {
  const total = Store.getCartTotal();
  const balance = Store.profile?.wallet_balance || 0;
  if (balance < total) { toast('Insufficient wallet balance 💔', 'error'); return; }

  const orderId = generateOrderId();
  await db.from('orders').insert({
    id: orderId, user_id: Store.user.id, items: Store.cart,
    total_amount: total, status: 'approved',
    payment_method: 'wallet', created_at: new Date().toISOString(),
  });

  await db.from('profiles').update({ wallet_balance: balance - total, total_spent: (Store.profile.total_spent || 0) + total })
    .eq('id', Store.user.id);

  Store.clearCart();
  toast(`Order placed! Paid from wallet 💜`, 'success');
  navigate('orders');
}

async function checkReferralRewards(orderTotal) {
  if (!Store.profile?.referred_by) return;
  let reward = 0;
  if (orderTotal >= 100000) reward = 10000;
  else if (orderTotal >= 10000) reward = 1000;
  if (reward > 0) {
    const { data: referrer } = await db.from('profiles').select('id,wallet_balance').eq('username', Store.profile.referred_by).single();
    if (referrer) {
      await db.from('profiles').update({ wallet_balance: (referrer.wallet_balance || 0) + reward }).eq('id', referrer.id);
      await db.from('notifications').insert({
        user_id: referrer.id,
        message: `You earned ${formatNaira(reward)} referral reward! 🎁`,
        type: 'reward', created_at: new Date().toISOString(),
      });
    }
  }
}

function renderLevelProgress(spent) {
  const tiers = [
    { name: 'Bronze', icon: '🥉', min: 0, max: 30000, class: 'level-bronze' },
    { name: 'Silver', icon: '🥈', min: 30000, max: 100000, class: 'level-silver' },
    { name: 'Gold', icon: '🥇', min: 100000, max: Infinity, class: 'level-gold' },
  ];
  const current = tiers.find((t, i) => spent >= t.min && (i === tiers.length - 1 || spent < tiers[i+1].min)) || tiers[0];
  const next = tiers[tiers.indexOf(current) + 1];
  const pct = next ? Math.min(100, ((spent - current.min) / (next.min - current.min)) * 100) : 100;

  return `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      ${tiers.map(t => `
        <div style="flex:1;text-align:center;opacity:${spent >= t.min ? 1 : 0.4}">
          <div style="font-size:1.8rem">${t.icon}</div>
          <div class="${t.class}" style="font-size:0.8rem;font-weight:700">${t.name}</div>
          <div style="font-size:0.7rem;color:var(--text-muted)">${formatNaira(t.min)}+</div>
        </div>
      `).join('<div style="color:var(--text-muted)">→</div>')}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:0.78rem;color:var(--text-muted)">
      <span>${formatNaira(spent)} spent</span>
      ${next ? `<span>${formatNaira(next.min - spent)} more to ${next.name} ${next.icon}</span>` : `<span class="text-gold">Max level reached! 🏆</span>`}
    </div>
  `;
}

          <option value="remove">Remove Balance</option>
        </select>
      </div>
      <div class="input-group">
        <label>Amount (₦)</label>

      </div>

        <button class="btn btn-primary" onclick="applyWalletAdjust('${userId}')">Apply ✨</button>
        <button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">Cancel</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

}

async function applyWalletAdjust(userId) {
  const action = document.getElementById('wallet-action').value;
  const amount = parseFloat(document.getElementById('wallet-amount').value);
  if (!amount || amount <= 0) { toast('Enter a valid amount', 'warn'); return; }

  const { data: u } = await db.from('profiles').select('wallet_balance').eq('id', userId).single();
  const current = u?.wallet_balance || 0;
  const newBalance = action === 'add' ? current + amount : Math.max(0, current - amount);

  await db.from('profiles').update({ wallet_balance: newBalance }).eq('id', userId);
  document.querySelector('.overlay')?.remove();
  toast(`Wallet ${action === 'add' ? 'credited' : 'debited'} ${formatNaira(amount)} ✨`);
  loadAdminTab('users');
}

async function toggleAdminRole(userId, currentRole) {
  const newRole = currentRole === 'admin' ? 'user' : 'admin';
  await db.from('profiles').update({ role: newRole }).eq('id', userId);
  toast(`Role updated to ${newRole} ✨`);
  loadAdminTab('users');
}

async function saveProduct(e, existingId) {
  e.preventDefault();
  const btn = document.getElementById('save-product-btn');
  setLoading(btn, true);

  const imageFiles = document.getElementById('p-images').files;
  const imageUrls = [];

  for (const file of imageFiles) {
    const path = `products/${Date.now()}_${file.name}`;
    const { data } = await db.storage.from('product-images').upload(path, file, { upsert: true });
    if (data) {
      const { data: urlData } = db.storage.from('product-images').getPublicUrl(path);
      if (urlData?.publicUrl) imageUrls.push(urlData.publicUrl);
    }
  }

  const productData = {
    name: document.getElementById('p-name').value,
    category: document.getElementById('p-category').value,
    price: parseFloat(document.getElementById('p-price').value),
    discount_price: parseFloat(document.getElementById('p-discount').value),
    stock_count: parseInt(document.getElementById('p-stock').value),
    description: document.getElementById('p-desc').value,
    tags: document.getElementById('p-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    is_flash: document.getElementById('p-flash').checked,
    in_stock: document.getElementById('p-instock').checked,
    ...(imageUrls.length > 0 ? { images: imageUrls } : {}),
    updated_at: new Date().toISOString(),
  };

  let error;
  if (existingId) {
    ({ error } = await db.from('products').update(productData).eq('id', existingId));
  } else {
    productData.created_at = new Date().toISOString();
    ({ error } = await db.from('products').insert(productData));
  }

  setLoading(btn, false);
  if (error) { toast('Failed to save product 💔', 'error'); return; }
  toast(existingId ? 'Product updated! ✨' : 'Product added! ✨');
  switchAdminTab('products');
}

async function editProduct(id) {
  const { data: p } = await db.from('products').select('*').eq('id', id).single();
  if (p) {
    adminTab = 'add-product';
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    renderAddProductForm(document.getElementById('admin-tab-content'), p);
  }
}

async function deleteProduct(id) {
  if (!confirm('Delete this product? This cannot be undone.')) return;
  await db.from('products').delete().eq('id', id);
  toast('Product deleted 🗑', 'info');
  loadAdminTab('products');
}

const QUICK_REPLIES = ['🔥 Flash Deals', '📦 Track Order', '🎁 Referrals', '💳 Payment Info', '📞 Support'];

function renderChatbot() {
  const widget = document.getElementById('chatbot-widget');
  widget.innerHTML = `
    <button class="chatbot-toggle" id="chatbot-btn" onclick="toggleChat()">
      <span id="chat-icon">💜</span>
      <div class="chatbot-notif" id="chat-notif"></div>
    </button>
    <div class="chatbot-window hidden" id="chatbot-window">
      <div class="chatbot-header">
        <div class="chatbot-avatar">✨</div>
        <div class="chatbot-header-info">
          <div class="chatbot-header-name">Rae Assistant</div>
          <div class="chatbot-header-status">● Online — Always here for you</div>
        </div>
        <button class="chatbot-close" onclick="toggleChat()">✕</button>
      </div>
      <div class="chatbot-messages" id="chatbot-messages">
        <!-- Messages rendered here -->
      </div>
      <div style="padding:0 16px 8px">
        <div class="chatbot-quick-replies">

      </div>

      </div>

  // Greet after a delay if not yet opened
  setTimeout(() => {

  }, 4000);

function toggleChat() {
  chatOpen = !chatOpen;
  const win = document.getElementById('chatbot-window');
  const icon = document.getElementById('chat-icon');
  const notif = document.getElementById('chat-notif');

  win?.classList.toggle('hidden', !chatOpen);
  if (icon) icon.textContent = chatOpen ? '✕' : '💜';
  if (notif) notif.style.display = 'none';

  if (chatOpen && chatHistory.length === 0) {
    setTimeout(() => {
      addBotMessage(BOT_RESPONSES.greeting[0]);
    }, 400);
  }

  if (chatOpen) {
    setTimeout(() => document.getElementById('chat-input')?.focus(), 200);
  }
}

function addBotMessage(text, showTyping = true) {
  const container = document.getElementById('chatbot-messages');
  if (!container) return;

  if (showTyping) {
    const typing = document.createElement('div');
    typing.className = 'chat-msg bot';
    typing.id = 'chat-typing';
    typing.innerHTML = `
      <div class="chat-msg-avatar">✨</div>
      <div class="chat-bubble">
        <div class="chat-typing"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;

    setTimeout(() => {
      typing.remove();
      renderBotBubble(text, container);
    }, 900 + Math.random() * 500);
  } else {
    renderBotBubble(text, container);
  }
}

function renderBotBubble(text, container) {
  const msg = document.createElement('div');
  msg.className = 'chat-msg bot';
  msg.innerHTML = `
    <div class="chat-msg-avatar">✨</div>
    <div class="chat-bubble">${text}</div>`;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  chatHistory.push({ role: 'bot', text });
}

function addUserMessage(text) {
  const container = document.getElementById('chatbot-messages');
  if (!container) return;
  const msg = document.createElement('div');
  msg.className = 'chat-msg user';
  msg.innerHTML = `<div class="chat-bubble">${text}</div>`;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  chatHistory.push({ role: 'user', text });
}

function sendQuick(text) {
  document.getElementById('chat-input').value = text;
  sendChatMessage();
}

function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';

  addUserMessage(text);

  // Determine response
  const lower = text.toLowerCase();
  let response;

  if (/hi|hello|hey|start|hola/.test(lower)) {
    response = BOT_RESPONSES.greeting[Math.floor(Math.random() * BOT_RESPONSES.greeting.length)];
  } else if (/deal|sale|discount|flash|offer/.test(lower)) {
    response = BOT_RESPONSES.deals[Math.floor(Math.random() * BOT_RESPONSES.deals.length)];
  } else if (/track|order|delivery|status|ship/.test(lower)) {
    response = BOT_RESPONSES.track[Math.floor(Math.random() * BOT_RESPONSES.track.length)];
  } else if (/refer|friend|link|earn|reward/.test(lower)) {
    response = BOT_RESPONSES.referral[Math.floor(Math.random() * BOT_RESPONSES.referral.length)];
  } else if (/pay|payment|bank|transfer|opay|proof/.test(lower)) {
    response = BOT_RESPONSES.payment[Math.floor(Math.random() * BOT_RESPONSES.payment.length)];
  } else if (/support|help|call|contact|whatsapp|phone/.test(lower)) {
    response = BOT_RESPONSES.support[Math.floor(Math.random() * BOT_RESPONSES.support.length)];
  } else if (/wallet|balance|credit|bonus/.test(lower)) {
    response = BOT_RESPONSES.wallet[Math.floor(Math.random() * BOT_RESPONSES.wallet.length)];
  } else if (/product|recommend|suggest|find|look/.test(lower)) {
    response = `✨ I'd love to help you find products! Try browsing our categories on the homepage, or use the search bar to find exactly what you're looking for. We have Fashion, Beauty, Tech, Home & more! 💜`;
  } else {
    response = BOT_RESPONSES.default[Math.floor(Math.random() * BOT_RESPONSES.default.length)];
  }

  addBotMessage(response);
}

// RAE ENTERPRISE — Router & App Init (bulletproof)
// ═══════════════════════════════════════════════════════

function navigate(page, params) {
  params = params || {};
  window.history.pushState({ page: page, params: params }, '', '#' + page);
  routeTo(page, params);
}

function getRoutePage() {
  return (window.location.hash || '').replace('#', '') || 'home';
}

function routeTo(page, params) {
  params = params || {};
  window.scrollTo(0, 0);
  renderNavbar();
  try {
    switch (page) {
      case 'home':          renderHome(); break;
      case 'login':         renderAuth('login'); break;
      case 'register':      renderAuth('register'); break;
      case 'product':       params.id ? renderProduct(params.id) : renderHome(); break;
      case 'cart':          renderCart(); break;
      case 'dashboard':     renderDashboard(); break;
      case 'orders':        renderOrders(); break;
      case 'referrals':     renderReferrals(); break;
      case 'wallet':        renderWallet(); break;
      case 'admin':         renderAdmin(); break;
      case 'notifications': renderNotifications(); break;
      default:              renderHome(); break;
    }
  } catch(e) {
    console.error('Route error:', e);
    renderHome();
  }
}

async function renderNotifications() {
  if (!Store.user) { navigate('login'); return; }
  var notifs = [];
  try {
    var res = await db.from('notifications').select('*')
      .eq('user_id', Store.user.id)
      .order('created_at', { ascending: false }).limit(30);
    notifs = res.data || [];
  } catch(e) {}

  var rows = notifs.length ? notifs.map(function(n) {
    return '<div style="display:flex;align-items:flex-start;gap:14px;padding:18px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);margin-bottom:10px">' +
      '<div style="font-size:1.5rem">' + (n.type==='reward'?'🎁':n.type==='order_update'?'📦':'💜') + '</div>' +
      '<div><div style="font-size:0.9rem;margin-bottom:4px">' + (n.message||'') + '</div>' +
      '<div style="font-size:0.75rem;color:var(--text-muted)">' + timeAgo(n.created_at) + '</div></div></div>';
  }).join('') : '<div style="text-align:center;padding:60px;color:var(--text-muted)"><div style="font-size:3rem">🔔</div><p>No notifications yet</p></div>';

  document.getElementById('app').innerHTML =
    '<div class="dashboard-page container page-enter">' +
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">' +
    '<button class="btn btn-ghost btn-sm" onclick="navigate(\'home\')">← Back</button>' +
    '<h1 class="section-title">🔔 Notifications</h1></div>' + rows + '</div>';
}

// ── INIT ──
function removeLdr() {
  var l = document.getElementById('rae-loader');
  if (l) {
    l.style.opacity = '0';
    l.style.transition = 'opacity 0.4s';
    setTimeout(function() { if (l && l.parentNode) l.parentNode.removeChild(l); }, 450);
  }
}

async function initApp() {
  // Safety: always remove loader after max 4 seconds no matter what
  var safetyTimer = setTimeout(removeLdr, 4000);

  try { await Store.loadUser(); } catch(e) { console.warn('Session err:', e); }

  try { renderNavbar(); } catch(e) { console.warn('Navbar err:', e); }
  try { renderChatbot(); } catch(e) { console.warn('Chatbot err:', e); }

  
  try { routeTo(getRoutePage()); } catch(e) { console.warn('Route err:', e); renderHome(); }

  window.addEventListener('popstate', function() {
    try { routeTo(getRoutePage()); } catch(e) { renderHome(); }
  });

  clearTimeout(safetyTimer);
  removeLdr();
}

document.addEventListener('DOMContentLoaded', function() {
  // Extra safety: if Supabase CDN not loaded after 5s, show error
  var tries = 0;
  var check = setInterval(function() {
    tries++;
    if (window.supabase) {
      clearInterval(check);
      initApp();
    } else if (tries > 50) {
      clearInterval(check);
      removeLdr();
      document.getElementById('app').innerHTML =
        '<div style="text-align:center;padding:80px 20px;padding-top:140px">' +
        '<div style="font-size:3rem;margin-bottom:16px">💜</div>' +
        '<h2 style="margin-bottom:12px;color:#F0E6FF">Rae Enterprise</h2>' +
        '<p style="color:rgba(240,230,255,0.6)">Please check your internet connection and refresh.</p>' +
        '<button onclick="location.reload()" style="margin-top:20px;padding:12px 28px;background:linear-gradient(135deg,#7B2EFF,#5B0FCC);color:#fff;border:none;border-radius:50px;font-size:1rem;cursor:pointer">Refresh ✨</button>' +
        '</div>';
    }
  }, 100);
});
